<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>RIPNSFW</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <script>
    // GitHub Pages SPA redirect trick
    // Saves the full path to sessionStorage and redirects to root,
    // where index.html reads it and restores the route via history.replaceState.
    var path = window.location.pathname + window.location.search + window.location.hash;
    sessionStorage.setItem('spa_redirect', path);
    window.location.replace('/');
  </script>
</head>
<body></body>
</html>
