<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exclusive Portal - Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #020617; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .modal-overlay { background-color: rgba(0,0,0,0.98); backdrop-filter: blur(20px); }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }
        img { transition: opacity 0.3s ease-in; content-visibility: auto; }
        .custom-scroll::-webkit-scrollbar { width:4px; }
        .custom-scroll::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(236,72,153,0.5); border-radius:10px; }
        .aspect-card { aspect-ratio: 3/4; }
        .aspect-video-box { aspect-ratio: 16/9; }

        /* Inline SVG icons via CSS — zero JS, zero re-render */
        .icon-arrow-left::before { content: '←'; font-size:1.1rem; }
        .icon-search { display:inline-flex; align-items:center; }
        .icon-x::before { content: '✕'; font-size:1rem; }
        .icon-play::before { content: '▶'; font-size:0.9rem; }
        .icon-ext::before { content: '↗'; font-size:0.85rem; }

        /* GPU-accelerated hover */
        .card-img { will-change: transform; transform: translateZ(0); }
        .card:hover .card-img { transform: scale(1.05) translateZ(0); transition: transform 0.45s ease; }
        .card .play-btn { opacity:0; transition: opacity 0.2s ease; }
        .card:hover .play-btn { opacity:1; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;

        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSs1GhZQnhVZLayT56Ik4zsE2GaWyVV6A0IeUz6YSMKGSN9jnmXjpWtIVbfUsXH1_Os17RG_oju8Ba3/pub?gid=0&single=true&output=csv";
        const MODEL_PHOTOS_PATH = "./imgs/";

        // ─── Utilities (defined once outside component) ───────────────────────────

        function useDebounce(value, delay) {
            const [dv, setDv] = useState(value);
            useEffect(() => {
                const t = setTimeout(() => setDv(value), delay);
                return () => clearTimeout(t);
            }, [value, delay]);
            return dv;
        }

        const IGNORED = new Set(["NAME","TEST","MODEL","EMPTY","ALINA","ANNA","BANANAPOTATO333","ERIN","IZZY","JUNIPER","KATERINA","LUCY","MISTY","NAKEDBARBIEDOLL","NINA","NIKOLETTA QUEEN","RAINI","SCARLETT","SCARLETT HAMPTOM","SHYLA","TESSA","THEODORA","VIOLET RAY","WILD HALLI","YUIWOO"]);

        function formatImageFileName(name) {
            if (!name) return "";
            return name.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g,'-') + ".jpg";
        }

        function processTags(tagString) {
            if (!tagString) return [];
            return tagString.replace(/,/g,' ').split(/[#\s]+/).map(t=>t.trim()).filter(t=>t.length>0);
        }

        // Runs once — result is stable
        function parseCSV(csvText) {
            const lines = csvText.trim().split('\n');
            const out = [];
            for (let i = 1; i < lines.length; i++) {
                const v = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (!v[2]) continue;
                const name = v[2].trim();
                if (IGNORED.has(name.toUpperCase())) continue;
                let embed = v[6]?.trim() || "";
                if (embed.includes("dood")) embed = embed.replace("/d/", "/e/");
                out.push({
                    ModelPhoto: v[0]?.trim() || '',
                    ModelName: name,
                    Link1: v[3]?.trim() || '',
                    Link2: v[4]?.trim() || '',
                    Link3: v[5]?.trim() || '',
                    EmbedVideo: embed,
                    Guests: v[7]?.trim() || '',
                    Category: v[8]?.trim() || '',
                    ID: v[10]?.trim() || '',
                    Tags: processTags(v[11]?.replace(/"/g,'').trim()),
                    VideoThumbnail: v[14]?.trim() || ''
                });
            }
            return out.reverse();
        }

        // ─── SVG Icons (static, no library needed) ────────────────────────────────
        const ArrowLeft = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <path d="M19 12H5M12 5l-7 7 7 7"/>
            </svg>
        );
        const SearchIcon = () => (
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
        );
        const XIcon = ({ size = 20 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <path d="M18 6 6 18M6 6l12 12"/>
            </svg>
        );
        const PlayIcon = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="white" stroke="none">
                <polygon points="5,3 19,12 5,21"/>
            </svg>
        );
        const ExtIcon = () => (
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
            </svg>
        );

        // ─── Lazy image with intersection observer ────────────────────────────────
        const LazyImg = React.memo(({ src, alt, className, fallback, onErrorSrc }) => {
            const ref = useRef(null);
            const [loaded, setLoaded] = useState(false);
            const [realSrc, setRealSrc] = useState(null);

            useEffect(() => {
                const el = ref.current;
                if (!el) return;
                const obs = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) { setRealSrc(src); obs.disconnect(); }
                }, { rootMargin: '200px' });
                obs.observe(el);
                return () => obs.disconnect();
            }, [src]);

            return (
                <img
                    ref={ref}
                    src={realSrc || undefined}
                    alt={alt}
                    decoding="async"
                    className={className}
                    style={{ opacity: loaded ? 1 : 0, transition: 'opacity 0.3s' }}
                    onLoad={() => setLoaded(true)}
                    onError={(e) => { e.target.onerror = null; e.target.src = onErrorSrc; setLoaded(true); }}
                />
            );
        });

        // ─── Pure card components (React.memo prevents unnecessary re-renders) ────
        const ModelCard = React.memo(({ model, onClick }) => (
            <div onClick={onClick} className="card group cursor-pointer">
                <div className="relative aspect-card rounded-2xl overflow-hidden mb-2 bg-slate-900 ring-1 ring-white/5 group-hover:ring-pink-500/50 transition-all duration-200">
                    <LazyImg
                        src={model.image}
                        alt={model.name}
                        className="card-img w-full h-full object-cover"
                        onErrorSrc={`https://ui-avatars.com/api/?name=${encodeURIComponent(model.name)}&background=1e293b&color=fff&size=512`}
                    />
                    <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent pointer-events-none"></div>
                    <div className="absolute bottom-2 left-3">
                        <p className="text-[8px] font-black text-pink-500 uppercase tracking-widest">{model.videoCount} Videos</p>
                    </div>
                </div>
                <h3 className="text-center font-bold text-xs text-slate-400 group-hover:text-white truncate">{model.name}</h3>
            </div>
        ));

        const VideoCard = React.memo(({ video, onClick }) => (
            <div onClick={onClick} className="card bg-slate-900/40 rounded-2xl overflow-hidden cursor-pointer hover:bg-slate-900/80 transition-colors border border-white/5 group">
                <div className="relative aspect-video-box bg-slate-800 overflow-hidden">
                    <LazyImg
                        src={video.VideoThumbnail || video.ModelPhoto}
                        alt={video.ID}
                        className="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity"
                        onErrorSrc="https://placehold.co/600x400/1e293b/white?text=No+Preview"
                    />
                    <div className="play-btn absolute inset-0 flex items-center justify-center bg-black/40">
                        <div className="w-12 h-12 bg-pink-600 rounded-full flex items-center justify-center shadow-xl">
                            <PlayIcon />
                        </div>
                    </div>
                    {video.Category && (
                        <div className="absolute top-2 right-2 bg-black/60 backdrop-blur-md px-2 py-0.5 rounded text-[8px] font-bold uppercase text-white">
                            {video.Category}
                        </div>
                    )}
                </div>
                <div className="p-4">
                    <h4 className="font-bold text-slate-100 text-xs mb-1 truncate">ID: {video.ID}</h4>
                    {video.Guests && <p className="text-[9px] text-pink-500 font-bold uppercase">w/ {video.Guests}</p>}
                </div>
            </div>
        ));

        // ─── Main App ─────────────────────────────────────────────────────────────
        const App = () => {
            const [rawDataTable, setRawDataTable] = useState([]);
            const [selectedModel, setSelectedModel] = useState(null);
            const [selectedVideo, setSelectedVideo] = useState(null);
            const [loading, setLoading] = useState(true);
            const [searchQuery, setSearchQuery] = useState("");

            const debouncedSearch = useDebounce(searchQuery, 300);

            useEffect(() => {
                fetch(SHEET_CSV_URL)
                    .then(res => res.text())
                    .then(text => { setRawDataTable(parseCSV(text)); setLoading(false); })
                    .catch(err => console.error("Load Error", err));
            }, []); // runs once only

            // Build models list — does NOT depend on selectedModel anymore
            const modelsList = useMemo(() => {
                const map = new Map();
                rawDataTable.forEach(item => {
                    const name = item.ModelName;
                    if (!map.has(name)) map.set(name, { name, image: MODEL_PHOTOS_PATH + formatImageFileName(name), videoCount: 0 });
                    map.get(name).videoCount++;
                });
                return Array.from(map.values())
                    .filter(m => m.videoCount > 1)
                    .sort((a, b) => a.name.localeCompare(b.name));
            }, [rawDataTable]); // only rebuilds when data changes

            // Filter models list separately
            const filteredModels = useMemo(() => {
                if (!debouncedSearch) return modelsList;
                const q = debouncedSearch.toLowerCase();
                return modelsList.filter(m => m.name.toLowerCase().includes(q));
            }, [modelsList, debouncedSearch]);

            // Videos for selected model
            const filteredVideos = useMemo(() => {
                if (!selectedModel) return [];
                let list = rawDataTable.filter(v => v.ModelName === selectedModel.name);
                if (debouncedSearch) {
                    const q = debouncedSearch.toLowerCase();
                    list = list.filter(v =>
                        v.ID.toLowerCase().includes(q) ||
                        v.Guests.toLowerCase().includes(q) ||
                        v.Category.toLowerCase().includes(q) ||
                        v.Tags.some(t => t.toLowerCase().includes(q))
                    );
                }
                return list;
            }, [selectedModel, rawDataTable, debouncedSearch]);

            const handleSelectModel = useCallback((model) => setSelectedModel(model), []);
            const handleBack = useCallback(() => { setSelectedModel(null); setSearchQuery(""); }, []);
            const handleCloseVideo = useCallback(() => setSelectedVideo(null), []);

            if (loading) return (
                <div className="flex h-screen items-center justify-center bg-slate-950">
                    <div className="flex flex-col items-center gap-4">
                        <div className="animate-spin rounded-full h-10 w-10 border-t-2 border-pink-500 border-r-2 border-r-transparent"></div>
                        <span className="text-slate-500 text-[10px] font-black uppercase tracking-[0.3em]">Loading Gallery...</span>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen pb-10 bg-slate-950 text-slate-200">
                    <header className="bg-slate-900/80 backdrop-blur-xl sticky top-0 z-40 border-b border-white/5 px-4 py-3">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row md:items-center justify-between gap-4">
                            <div className="flex items-center gap-4">
                                {selectedModel && (
                                    <button onClick={handleBack} className="p-2 hover:bg-white/10 rounded-full transition-all active:scale-90">
                                        <ArrowLeft />
                                    </button>
                                )}
                                <h1 className="text-xl font-black italic uppercase tracking-tighter text-white">
                                    {selectedModel ? selectedModel.name : 'Exclusive Portal'}
                                </h1>
                            </div>
                            <div className="relative flex-1 max-w-md">
                                <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500"><SearchIcon /></span>
                                <input
                                    type="text"
                                    placeholder={selectedModel ? `Search ${selectedModel.name}...` : "Search models..."}
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                    className="w-full bg-slate-950/50 border border-white/10 rounded-xl py-2 pl-10 pr-4 text-sm focus:outline-none focus:border-pink-500/50 transition-all"
                                />
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto p-4 md:p-8">
                        {!selectedModel ? (
                            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4 md:gap-6 animate-in">
                                {filteredModels.map((model) => (
                                    <ModelCard key={model.name} model={model} onClick={() => handleSelectModel(model)} />
                                ))}
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 animate-in">
                                {filteredVideos.map((video, idx) => (
                                    <VideoCard key={video.ID + idx} video={video} onClick={() => setSelectedVideo(video)} />
                                ))}
                            </div>
                        )}
                    </main>

                    {selectedVideo && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay animate-in">
                            <div className="bg-slate-950 w-full max-w-5xl rounded-3xl overflow-hidden shadow-2xl border border-white/10 flex flex-col lg:flex-row max-h-[90vh]">
                                <div className="flex-[2] bg-black relative">
                                    <iframe
                                        src={selectedVideo.EmbedVideo}
                                        className="w-full h-full aspect-video lg:aspect-auto"
                                        frameBorder="0"
                                        allowFullScreen
                                        loading="lazy"
                                    ></iframe>
                                    <button onClick={handleCloseVideo} className="absolute top-4 right-4 lg:hidden bg-black/50 p-2 rounded-full">
                                        <XIcon size={20} />
                                    </button>
                                </div>
                                <div className="flex-1 p-6 lg:p-8 overflow-y-auto custom-scroll bg-slate-900/30">
                                    <div className="hidden lg:flex justify-end mb-4">
                                        <button onClick={handleCloseVideo} className="text-slate-500 hover:text-white p-1">
                                            <XIcon size={24} />
                                        </button>
                                    </div>
                                    <h2 className="text-2xl font-black uppercase italic mb-1 text-white">{selectedVideo.ModelName}</h2>
                                    <p className="text-pink-500 font-bold text-[10px] mb-6 tracking-widest uppercase">{selectedVideo.Category}</p>
                                    <div className="grid gap-3">
                                        {selectedVideo.Link1 && (
                                            <a href={selectedVideo.Link1} target="_blank" rel="noopener" className="flex items-center justify-between p-3 bg-pink-600 rounded-xl text-[10px] font-black uppercase hover:bg-pink-700 transition-colors">
                                                Primary Server <ExtIcon />
                                            </a>
                                        )}
                                        {selectedVideo.Link2 && (
                                            <a href={selectedVideo.Link2} target="_blank" rel="noopener" className="flex items-center justify-between p-3 bg-slate-800 rounded-xl text-[10px] font-black uppercase hover:bg-slate-700 transition-colors">
                                                Backup Mirror <ExtIcon />
                                            </a>
                                        )}
                                        {selectedVideo.Link3 && (
                                            <a href={selectedVideo.Link3} target="_blank" rel="noopener" className="flex items-center justify-between p-3 bg-slate-800 rounded-xl text-[10px] font-black uppercase hover:bg-slate-700 transition-colors">
                                                Mirror 2 <ExtIcon />
                                            </a>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
