        // If we arrived via 404.html redirect, restore the original URL silently
        (function () {
            const redir = sessionStorage.getItem('spa_redirect');
            if (redir && redir !== '/') {
                sessionStorage.removeItem('spa_redirect');
                history.replaceState(null, '', redir);
            }
        })();

        // ── Security screen controller ────────────────────────────────────────────────
        (function () {
            let pct = 0;
            let rafId = null;
            let done = false;

            const fill = document.getElementById('sec-bar-fill');
            const pctEl = document.getElementById('sec-pct');
            const chk1 = document.getElementById('chk1');
            const chk2 = document.getElementById('chk2');
            const chk3 = document.getElementById('chk3');

            function setCheck(el, state) {
                el.classList.remove('active', 'done');
                if (state) el.classList.add(state);
            }
            function updateChecks(p) {
                if (p < 35) { setCheck(chk1, 'active'); setCheck(chk2, ''); setCheck(chk3, ''); }
                else if (p < 70) { setCheck(chk1, 'done'); setCheck(chk2, 'active'); setCheck(chk3, ''); }
                else if (p < 99) { setCheck(chk1, 'done'); setCheck(chk2, 'done'); setCheck(chk3, 'active'); }
                else { setCheck(chk1, 'done'); setCheck(chk2, 'done'); setCheck(chk3, 'done'); }
            }

            // Fake progress: slow steady advance to 82%, stalls there until real data arrives
            // Uses setTimeout (not rAF) so it advances at human-readable pace ~1% per 60ms
            let lastTime = 0;
            function tick(ts) {
                if (done) return;
                if (ts - lastTime < 60) { rafId = requestAnimationFrame(tick); return; }
                lastTime = ts;
                // Speed slows down as it approaches 82% ceiling
                const speed = pct < 30 ? 0.8
                    : pct < 55 ? 0.5
                        : pct < 72 ? 0.28
                            : pct < 82 ? 0.1
                                : 0; // stop at 82, wait for real data
                pct = Math.min(pct + speed, 82);
                fill.style.width = pct + '%';
                pctEl.textContent = Math.round(pct) + '%';
                updateChecks(pct);
                if (pct < 82) rafId = requestAnimationFrame(tick);
            }
            rafId = requestAnimationFrame(tick);

            window._secDone = function(onFinish) {
                done = true;
                cancelAnimationFrame(rafId);
                let p2 = pct;
                function finish() {
                    p2 = Math.min(p2 + 4, 100);
                    fill.style.width = p2 + '%';
                    pctEl.textContent = Math.round(p2) + '%';
                    updateChecks(p2);
                    if (p2 < 100) requestAnimationFrame(finish);
                    else {
                        setTimeout(() => {
                            const sp = document.getElementById('spinner');
                            sp.style.transition = 'opacity .35s ease';
                            sp.style.opacity = '0';
                            setTimeout(() => { sp.style.display = 'none'; onFinish(); }, 350);
                        }, 220);
                    }
                }
                requestAnimationFrame(finish);
            };
        })();

        // ── Config ────────────────────────────────────────────────────────────────────
        // /pub endpoint has no HTTP cache; export URL is served via Google's CDN with proper caching
        const SHEET_ID = "2PACX-1vSs1GhZQnhVZLayT56Ik4zsE2GaWyVV6A0IeUz6YSMKGSN9jnmXjpWtIVbfUsXH1_Os17RG_oju8Ba3";
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pub?gid=0&single=true&output=csv`;
        const IMGS_PATH = "./imgs/";

        const IGNORED = new Set(["NAME", "TEST", "MODEL", "EMPTY", "ALINA", "ANNA", "BANANAPOTATO333", "ERIN", "IZZY", "JUNIPER", "KATERINA", "LUCY", "MISTY", "NAKEDBARBIEDOLL", "NINA", "NIKOLETTA QUEEN", "RAINI", "SCARLETT", "SCARLETT HAMPTOM", "SHYLA", "TESSA", "THEODORA", "VIOLET RAY", "WILD HALLI", "YUIWOO", "STELLA LUXX", "REBECA FOX", "BRITNEY ROSE", "EVA NYX", "ELLIE NOVA"]);

        // ── Shared IntersectionObserver ───────────────────────────────────────────────
        const imgObs = new IntersectionObserver(entries => {
            for (const e of entries) {
                if (!e.isIntersecting) continue;
                const img = e.target;
                if (img.dataset.src) { img.src = img.dataset.src; delete img.dataset.src; }
                imgObs.unobserve(img);
            }
        }, { rootMargin: '250px' });

        // ── Utilities ─────────────────────────────────────────────────────────────────
        // nameToSlug: used for both URL paths and image filenames
        function nameToSlug(name) {
            return name.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
        }
        function toSlug(name) { return nameToSlug(name) + ".jpg"; }
        function toEmbed(url) {
            if (!url) return '';
            try {
                const u = new URL(url);
                const h = u.hostname;
                if (h.includes('doodstream') || h.includes('lulustream')) return url.replace(/\/d\//, '/e/');
                if (h.includes('vidnest')) { const id = u.pathname.replace(/^\//, ''); return u.origin + '/embed-' + id + '.html'; }
                return url;
            } catch { return url; }
        }
        function csvSplit(line) {
            // Fast CSV split respecting quoted fields
            const cols = [];
            let cur = '', inQ = false;
            for (let i = 0; i < line.length; i++) {
                const c = line[i];
                if (c === '"') { inQ = !inQ; }
                else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
                else cur += c;
            }
            cols.push(cur.trim());
            return cols;
        }
        function parseCSV(csv) {
            // Normalize line endings — Google Sheets can return \r\n on some clients
            const lines = csv.trim().replace(/\r/g, '').split('\n');
            const out = [];
            for (let i = 1; i < lines.length; i++) {
                const v = csvSplit(lines[i]);
                if (!v[2]) continue;
                // Strip ALL whitespace variants (\r, nbsp, zero-width, etc.)
                const name = v[2].replace(/[\s\u00a0\u200b\u200c\u200d\ufeff]+/g, ' ').trim();
                if (!name) continue;
                if (IGNORED.has(name.toUpperCase())) continue;
                const l1 = v[3] || '', l2 = v[4] || '', l3 = v[5] || '';
                out.push({
                    ModelName: name,
                    Link1: l1, Link2: l2, Link3: l3,
                    Embed1: toEmbed(l1), Embed2: toEmbed(l2), Embed3: toEmbed(l3),
                    Guests: v[7] || '',
                    Category: v[8] || '',
                    ID: v[10] || '',
                    Tags: (v[11] || '').replace(/"/g, '').replace(/,/g, ' ').split(/[#\s]+/).filter(Boolean),
                    Thumb: v[14] || '',
                    Photo: v[0] || '',
                });
            }
            return out.reverse();
        }

        // ── State ─────────────────────────────────────────────────────────────────────
        let allData = [];
        let modelMap = new Map();   // name → { name, slug, count }
        let curModel = null;
        let curVideo = null;
        let activePlayerIdx = 0;
        let searchQ = '';
        let debTimer = null;

        // ── DOM refs ──────────────────────────────────────────────────────────────────
        const $ = id => document.getElementById(id);
        const modelGrid = $('model-grid');
        const videoGrid = $('video-grid');
        const pageTitle = $('page-title');
        const homeLink = $('home-link');
        const backBtn = $('back-btn');
        const searchEl = $('search');
        const modal = $('modal');
        const modalVideo = $('modal-video');
        const mTitle = $('m-title');
        const mCat = $('m-cat');
        const mGuests = $('m-guests');
        const mId = $('m-id');
        const ptabs = $('ptabs');
        const dlLinks = $('dl-links');

        // ── Lazy image helper ─────────────────────────────────────────────────────────
        function lazyImg(src, alt, fallback) {
            const img = document.createElement('img');
            img.dataset.src = src;
            img.alt = alt;
            img.decoding = 'async';
            img.onload = () => img.classList.add('loaded');
            img.onerror = () => { img.onerror = null; img.src = fallback; img.classList.add('loaded'); };
            imgObs.observe(img);
            return img;
        }

        // ── Build a single model card element ────────────────────────────────────────
        function makeModelCard(m) {
            const card = document.createElement('div');
            card.className = 'mcard';
            card.onclick = () => openModel(m);
            const imgWrap = document.createElement('div');
            imgWrap.className = 'mcard-img';
            const img = lazyImg(
                IMGS_PATH + m.slug, m.name,
                `https://ui-avatars.com/api/?name=${encodeURIComponent(m.name)}&background=1e293b&color=fff&size=400`
            );
            imgWrap.appendChild(img);
            const grad = document.createElement('div');
            grad.className = 'mcard-grad';
            imgWrap.appendChild(grad);
            const cnt = document.createElement('span');
            cnt.className = 'mcard-count';
            cnt.textContent = m.count + ' vídeos';
            imgWrap.appendChild(cnt);
            const lbl = document.createElement('p');
            lbl.className = 'mcard-name';
            lbl.textContent = m.name;
            card.appendChild(imgWrap);
            card.appendChild(lbl);
            return card;
        }

        // ── Render model grid in idle chunks (never blocks main thread) ───────────────
        let _renderModelToken = 0;
        function renderModels() {
            const token = ++_renderModelToken;
            const q = searchQ.toLowerCase();
            const items = [];
            for (const [, m] of modelMap) {
                if (!q || m.name.toLowerCase().includes(q)) items.push(m);
            }

            modelGrid.innerHTML = '';

            if (items.length === 0) {
                const empty = document.createElement('p');
                empty.className = 'empty';
                empty.textContent = 'Nenhum modelo encontrado.';
                modelGrid.appendChild(empty);
                return;
            }

            const CHUNK = 12;
            let idx = 0;

            function flush(deadline) {
                if (token !== _renderModelToken) return; // stale render, abort
                const frag = document.createDocumentFragment();
                const limit = Math.min(idx + CHUNK, items.length);
                while (idx < limit) frag.appendChild(makeModelCard(items[idx++]));
                modelGrid.appendChild(frag);
                if (idx < items.length) {
                    const schedule = typeof requestIdleCallback !== 'undefined'
                        ? requestIdleCallback
                        : (cb) => setTimeout(cb, 0);
                    schedule(flush);
                }
            }

            // First chunk synchronously so screen shows content instantly
            const firstFrag = document.createDocumentFragment();
            const firstLimit = Math.min(CHUNK, items.length);
            while (idx < firstLimit) firstFrag.appendChild(makeModelCard(items[idx++]));
            modelGrid.appendChild(firstFrag);
            modelGrid.classList.add('fade-in');

            if (idx < items.length) {
                const schedule = typeof requestIdleCallback !== 'undefined'
                    ? requestIdleCallback
                    : (cb) => setTimeout(cb, 16);
                schedule(flush);
            }
        }

        // ── Build a single video card element ────────────────────────────────────────
        function makeVideoCard(v) {
            const card = document.createElement('div');
            card.className = 'vcard';
            card.onclick = () => openVideo(v);
            const thumb = document.createElement('div');
            thumb.className = 'vcard-thumb';
            const img = lazyImg(v.Thumb || v.Photo, v.ID, 'https://placehold.co/600x338/0f172a/1e293b?text=.');
            thumb.appendChild(img);
            const playWrap = document.createElement('div');
            playWrap.className = 'vcard-play';
            const circle = document.createElement('div');
            circle.className = 'play-circle';
            circle.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>`;
            playWrap.appendChild(circle);
            thumb.appendChild(playWrap);
            if (v.Category) {
                const cat = document.createElement('span');
                cat.className = 'vcard-cat';
                cat.textContent = v.Category;
                thumb.appendChild(cat);
            }
            const info = document.createElement('div');
            info.className = 'vcard-info';
            const idEl = document.createElement('p');
            idEl.className = 'vcard-id';
            idEl.textContent = 'ID: ' + v.ID;
            info.appendChild(idEl);
            if (v.Guests) {
                const g = document.createElement('p');
                g.className = 'vcard-guests';
                g.textContent = 'w/ ' + v.Guests;
                info.appendChild(g);
            }
            card.appendChild(thumb);
            card.appendChild(info);
            return card;
        }

        // ── Render video grid in idle chunks ──────────────────────────────────────────
        let _renderVideoToken = 0;
        function renderVideos() {
            const token = ++_renderVideoToken;
            const q = searchQ.toLowerCase();
            const modelName = curModel.name;
            const items = allData.filter(v => {
                if (v.ModelName !== modelName) return false;
                if (!q) return true;
                return v.ID.toLowerCase().includes(q) ||
                    v.Guests.toLowerCase().includes(q) ||
                    v.Category.toLowerCase().includes(q) ||
                    v.Tags.some(t => t.toLowerCase().includes(q));
            });

            videoGrid.innerHTML = '';

            if (items.length === 0) {
                const empty = document.createElement('p');
                empty.className = 'empty';
                empty.textContent = 'Nenhum vídeo encontrado.';
                videoGrid.appendChild(empty);
                return;
            }

            const CHUNK = 9;
            let idx = 0;

            function flush() {
                if (token !== _renderVideoToken) return;
                const frag = document.createDocumentFragment();
                const limit = Math.min(idx + CHUNK, items.length);
                while (idx < limit) frag.appendChild(makeVideoCard(items[idx++]));
                videoGrid.appendChild(frag);
                if (idx < items.length) setTimeout(flush, 0);
            }

            // First chunk sync
            const firstFrag = document.createDocumentFragment();
            const firstLimit = Math.min(CHUNK, items.length);
            while (idx < firstLimit) firstFrag.appendChild(makeVideoCard(items[idx++]));
            videoGrid.appendChild(firstFrag);
            videoGrid.classList.add('fade-in');

            if (idx < items.length) setTimeout(flush, 0);
        }

        // ── Routing helpers ───────────────────────────────────────────────────────────
        // Detect GitHub Pages repo prefix (e.g. /repo-name) vs root deployment
        // Hardcoded repo base — works correctly on both root and subpath deployments
        const BASE = ''; // custom domain at root

        function modelUrl(m) {
            return BASE + '/model/' + nameToSlug(m.name);
        }

        // Build a reverse slug→model lookup after data loads
        let slugMap = new Map(); // slug → model object
        function buildSlugMap() {
            slugMap.clear();
            for (const [, m] of modelMap) slugMap.set(nameToSlug(m.name), m);
        }

        // ── Navigation ────────────────────────────────────────────────────────────────
        function openModel(m, replaceState) {
            curModel = m;
            searchQ = '';
            searchEl.value = '';
            searchEl.placeholder = `Search in ${m.name}…`;
            if (homeLink) homeLink.textContent = m.name;
            else pageTitle.textContent = m.name; // fallback
            document.title = m.name + ' — RIPNSFW';
            backBtn.style.display = 'flex';
            modelGrid.style.display = 'none';
            videoGrid.style.display = 'grid';
            renderVideos();
            window.scrollTo({ top: 0, behavior: 'instant' });
            const url = modelUrl(m);
            if (replaceState) history.replaceState({ model: m.name }, '', url);
            else history.pushState({ model: m.name }, '', url);
        }
        function goBack(fromPopState) {
            curModel = null;
            searchQ = '';
            searchEl.value = '';
            searchEl.placeholder = 'Search model…';
            if (homeLink) homeLink.textContent = 'RIPNSFW';
            else pageTitle.textContent = 'RIPNSFW'; // fallback
            document.title = 'RIPNSFW';
            backBtn.style.display = 'none';
            videoGrid.style.display = 'none';
            modelGrid.style.display = 'grid';
            renderModels();
            window.scrollTo({ top: 0, behavior: 'instant' });
            if (!fromPopState) history.pushState({}, '', BASE + '/');
        }
        // Handle browser back/forward & swipe gestures
        window.addEventListener('popstate', () => {
            const { modelSlug, videoId } = parsePath();

            if (modelSlug && videoId) {
                // /model/{slug}/{id} — make sure correct model is open then open video
                const m = slugMap.get(modelSlug);
                if (m) {
                    if (!curModel || curModel.name !== m.name) openModel(m, true);
                    const v = allData.find(r => r.ModelName === m.name && r.ID === videoId);
                    if (v) { openVideo(v, true); return; }
                }
            }

            if (modelSlug) {
                // /model/{slug} — show model, close modal if open
                if (curVideo) { closeModal(true); return; }
                const m = slugMap.get(modelSlug);
                if (m) { openModel(m, true); return; }
            }

            // / — home
            if (curVideo) { closeModal(true); return; }
            if (curModel) { goBack(true); return; }
        });

        function parsePath() {
            const match = location.pathname.match(/\/model\/([^\/]+)(?:\/([^\/]+))?/);
            if (!match) return {};
            return { modelSlug: match[1], videoId: match[2] ? decodeURIComponent(match[2]) : null };
        }
        function getSlugFromPath() { return parsePath().modelSlug || null; }

        // ── Modal ─────────────────────────────────────────────────────────────────────
        const EXT_ICON = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`;

        function buildPlayers(v) {
            const data = [
                { embed: v.Embed1, dl: v.Link1, label: 'Player 1' },
                { embed: v.Embed2, dl: v.Link2, label: 'Player 2' },
                { embed: v.Embed3, dl: v.Link3, label: 'Player 3' },
            ].filter(p => p.embed);
            return data;
        }

        function setActivePlayer(players, idx) {
            activePlayerIdx = idx;
            // Swap iframe (key trick: remove and re-add)
            const old = modalVideo.querySelector('iframe');
            if (old) old.remove();
            if (players[idx]) {
                const iframe = document.createElement('iframe');
                iframe.src = players[idx].embed;
                iframe.allowFullscreen = true;
                iframe.setAttribute('allowfullscreen', '');
                modalVideo.insertBefore(iframe, modalVideo.firstChild);
            }
            // Update tab styles
            const tabs = ptabs.querySelectorAll('.ptab');
            tabs.forEach((t, i) => t.classList.toggle('active', i === idx));
        }

        function openVideo(v, replaceState) {
            curVideo = v;
            const players = buildPlayers(v);

            mTitle.textContent = v.ModelName;
            mCat.textContent = v.Category || '';
            mGuests.textContent = v.Guests ? 'w/ ' + v.Guests : '';
            mId.textContent = 'ID: ' + v.ID;
            mCat.style.display = v.Category ? '' : 'none';
            mGuests.style.display = v.Guests ? '' : 'none';

            // Build tabs
            ptabs.innerHTML = '';
            if (players.length > 1) {
                players.forEach((p, i) => {
                    const btn = document.createElement('button');
                    btn.className = 'ptab' + (i === 0 ? ' active' : '');
                    btn.textContent = p.label;
                    btn.onclick = () => setActivePlayer(players, i);
                    ptabs.appendChild(btn);
                });
                ptabs.style.display = 'flex';
            } else {
                ptabs.style.display = 'none';
            }

            // Build download links
            dlLinks.innerHTML = '';
            if (players.length === 0) {
                dlLinks.innerHTML = '<p class="no-links">Nenhum link disponível.</p>';
            } else {
                players.forEach((p, i) => {
                    if (!p.dl) return;
                    const a = document.createElement('a');
                    a.href = p.dl;
                    a.target = '_blank';
                    a.rel = 'noopener noreferrer';
                    a.className = 'dl-link ' + (i === 0 ? 'primary' : 'secondary');
                    a.innerHTML = 'Download ' + (i + 1) + ' ' + EXT_ICON;
                    dlLinks.appendChild(a);
                });
            }

            setActivePlayer(players, 0);
            modal.classList.add('open');
            document.body.style.overflow = 'hidden';

            // Update URL to /model/{slug}/{id}
            if (curModel) {
                const url = modelUrl(curModel) + '/' + encodeURIComponent(v.ID);
                if (replaceState) history.replaceState({ model: curModel.name, videoId: v.ID }, '', url);
                else history.pushState({ model: curModel.name, videoId: v.ID }, '', url);
            }
        }

        function closeModal(fromPopState) {
            modal.classList.remove('open');
            document.body.style.overflow = '';
            const iframe = modalVideo.querySelector('iframe');
            if (iframe) iframe.remove();
            curVideo = null;
            // Restore model URL, unless we got here via popstate (browser already handled URL)
            if (!fromPopState && curModel) {
                history.pushState({ model: curModel.name }, '', modelUrl(curModel));
            }
        }

        // ── Search ────────────────────────────────────────────────────────────────────
        searchEl.addEventListener('input', e => {
            clearTimeout(debTimer);
            debTimer = setTimeout(() => {
                searchQ = e.target.value.trim();
                if (curModel) renderVideos();
                else renderModels();
            }, 280);
        });

        // ── Events ────────────────────────────────────────────────────────────────────
        backBtn.onclick = () => goBack(false);
        if (homeLink) {
            homeLink.onclick = (e) => {
                // Keep SPA navigation: don't reload the whole page when clicking the title/logo.
                e.preventDefault();
                if (curVideo) { closeModal(false); return; }
                if (curModel) { goBack(false); return; }
                if (location.pathname !== (BASE + '/')) history.pushState({}, '', BASE + '/');
                window.scrollTo({ top: 0, behavior: 'instant' });
            };
        }
        $('close-mob').onclick = () => closeModal(false);
        $('close-desk').onclick = () => closeModal(false);
        modal.addEventListener('click', e => { if (e.target === modal) closeModal(false); });
        document.addEventListener('keydown', e => { if (e.key === 'Escape' && curVideo) closeModal(false); });

        // ── Init ──────────────────────────────────────────────────────────────────────
        const CACHE_KEY = 'ep_csv_v4'; // bumped version busts all old caches automatically
        const CACHE_TTL = 30 * 60 * 1000;

        // Wipe any old cache keys from previous versions
        ['ep_csv_cache', 'ep_csv_v2', 'ep_csv_v3'].forEach(k => { try { localStorage.removeItem(k); } catch { } });

        function saveCache(csv) {
            try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), csv })); } catch { }
        }

        function fetchFresh(onDone) {
            fetch(SHEET_URL)
                .then(r => r.text())
                .then(csv => { saveCache(csv); onDone && onDone(csv); })
                .catch(() => {
                    $('spinner').innerHTML = '<p style="color:#ef4444;font-size:.85rem">Failed to load data.</p>';
                });
        }

        function processCSV(csv) {
            allData = parseCSV(csv);
            const tempMap = new Map();
            for (const row of allData) {
                const n = row.ModelName;
                if (!tempMap.has(n)) tempMap.set(n, { name: n, slug: toSlug(n), count: 0 });
                tempMap.get(n).count++;
            }
            // Order by most recent activity — first appearance in data (already reversed = newest first)
            // Build ordered list preserving insertion order from the CSV
            const sorted = [...tempMap.values()].filter(m => m.count > 1);
            modelMap = new Map(sorted.map(m => [m.name, m]));
            buildSlugMap();

            window._secDone(() => {
                $('app').style.display = '';
                const { modelSlug, videoId } = parsePath();
                if (modelSlug && slugMap.has(modelSlug)) {
                    const m = slugMap.get(modelSlug);
                    openModel(m, true);
                    if (videoId) {
                        const v = allData.find(r => r.ModelName === m.name && r.ID === videoId);
                        if (v) openVideo(v, true);
                    }
                } else {
                    renderModels();
                }
            });
        }

        (function init() {
            let served = false;
            try {
                const raw = localStorage.getItem(CACHE_KEY);
                if (raw) {
                    const { ts, csv } = JSON.parse(raw);
                    served = true;
                    processCSV(csv);
                    // If cache is stale, refresh and re-render (previously we refreshed silently but kept old UI)
                    if (Date.now() - ts > CACHE_TTL) fetchFresh(processCSV);
                }
            } catch { }
            if (!served) fetchFresh(csv => processCSV(csv));
        })();
