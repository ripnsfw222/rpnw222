    <script>
        // ── GitHub Pages SPA redirect handler ────────────────────────────────────────
        (function () {
            const redir = sessionStorage.getItem('spa_redirect');
            if (redir && redir !== '/') {
                sessionStorage.removeItem('spa_redirect');
                history.replaceState(null, '', redir);
            }
        })();

        // ── Security screen controller ────────────────────────────────────────────────
        (function () {
            let pct = 0;
            let rafId = null;
            let done = false;

            const fill = document.getElementById('sec-bar-fill');
            const pctEl = document.getElementById('sec-pct');
            const chk1 = document.getElementById('chk1');
            const chk2 = document.getElementById('chk2');
            const chk3 = document.getElementById('chk3');

            function setCheck(el, state) {
                el.classList.remove('active', 'done');
                if (state) el.classList.add(state);
            }
            function updateChecks(p) {
                if (p < 35) { setCheck(chk1, 'active'); setCheck(chk2, ''); setCheck(chk3, ''); }
                else if (p < 70) { setCheck(chk1, 'done'); setCheck(chk2, 'active'); setCheck(chk3, ''); }
                else if (p < 99) { setCheck(chk1, 'done'); setCheck(chk2, 'done'); setCheck(chk3, 'active'); }
                else { setCheck(chk1, 'done'); setCheck(chk2, 'done'); setCheck(chk3, 'done'); }
            }

            let lastTime = 0;
            function tick(ts) {
                if (done) return;
                if (ts - lastTime < 60) { rafId = requestAnimationFrame(tick); return; }
                lastTime = ts;
                const speed = pct < 30 ? 0.8
                    : pct < 55 ? 0.5
                        : pct < 72 ? 0.28
                            : pct < 82 ? 0.1
                                : 0;
                pct = Math.min(pct + speed, 82);
                fill.style.width = pct + '%';
                pctEl.textContent = Math.round(pct) + '%';
                updateChecks(pct);
                if (pct < 82) rafId = requestAnimationFrame(tick);
            }
            rafId = requestAnimationFrame(tick);

            window._secDone = function (onFinish) {
                done = true;
                cancelAnimationFrame(rafId);
                let p2 = pct;
                function finish() {
                    p2 = Math.min(p2 + 4, 100);
                    fill.style.width = p2 + '%';
                    pctEl.textContent = Math.round(p2) + '%';
                    updateChecks(p2);
                    if (p2 < 100) requestAnimationFrame(finish);
                    else {
                        setTimeout(() => {
                            const sp = document.getElementById('spinner');
                            sp.style.transition = 'opacity .35s ease';
                            sp.style.opacity = '0';
                            setTimeout(() => { sp.style.display = 'none'; onFinish(); }, 350);
                        }, 220);
                    }
                }
                requestAnimationFrame(finish);
            };
        })();

        // ── Config ────────────────────────────────────────────────────────────────────
        const SHEET_URL = "/data.csv";   // caminho absoluto — evita resolver relativo a /model/... após replaceState
        const IMGS_PATH = "/imgs/";

        const IMG_VERSION = Math.floor(Date.now() / (1000 * 60 * 60 * 24)); // muda 1x por dia

        // IGNORED é carregado de /blacklist.txt em paralelo com o CSV
        let IGNORED = new Set();

        // ── Shared IntersectionObserver ───────────────────────────────────────────────
        const imgObs = new IntersectionObserver(entries => {
            for (const e of entries) {
                if (!e.isIntersecting) continue;
                const img = e.target;
                if (img.dataset.src) { img.src = img.dataset.src; delete img.dataset.src; }
                imgObs.unobserve(img);
            }
        }, { rootMargin: '250px' });

        // ── Utilities ─────────────────────────────────────────────────────────────────
        function nameToSlug(name) {
            return name.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
        }
        function toSlug(name) { return nameToSlug(name) + ".jpg"; }
        function toEmbed(url) {
            if (!url) return '';
            try {
                const u = new URL(url);
                const h = u.hostname;
                if (h.includes('streamtape') || h.includes('vidneststream')) return url.replace(/\/v\//, '/e/');
                if (h.includes('doodstream') || h.includes('lulustream')) return url.replace(/\/d\//, '/e/');
                if (h.includes('vidnest')) { const id = u.pathname.replace(/^\//, ''); return u.origin + '/embed-' + id + '.html'; }
                return url;
            } catch { return url; }
        }
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }
        function markVideosAsSeen(items) {
            try {
                const seen = JSON.parse(sessionStorage.getItem('seen_videos') || '[]');
                const seenSet = new Set(seen);
                items.forEach(item => seenSet.add(item.ID));
                sessionStorage.setItem('seen_videos', JSON.stringify([...seenSet]));
            } catch (e) { }
        }
        function csvSplit(line) {
            const cols = [];
            let cur = '', inQ = false;
            for (let i = 0; i < line.length; i++) {
                const c = line[i];
                if (c === '"') { inQ = !inQ; }
                else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
                else cur += c;
            }
            cols.push(cur.trim());
            return cols;
        }
        function parseCSV(csv) {
            const lines = csv.trim().replace(/\r/g, '').split('\n');
            const out = [];
            for (let i = 1; i < lines.length; i++) {
                const v = csvSplit(lines[i]);
                if (!v[2]) continue;
                const name = v[2].replace(/[\s\u00a0\u200b\u200c\u200d\ufeff]+/g, ' ').trim();
                if (!name) continue;
                if (IGNORED.has(name.toUpperCase())) continue;
                const l1 = v[3] || '', l2 = v[4] || '', l3 = v[5] || '';
                out.push({
                    ModelName: name,
                    Link1: l1, Link2: l2, Link3: l3,
                    Embed1: toEmbed(l1), Embed2: toEmbed(l2), Embed3: toEmbed(l3),
                    Guests: v[7] || '',
                    Category: v[8] || '',
                    ID: v[10] || '',
                    Tags: (v[11] || '').replace(/"/g, '').replace(/,/g, ' ').split(/[#\s]+/).filter(Boolean),
                    Thumb: v[0] ? '/thumbs/' + v[0].trim() : '',
                    Photo: v[0] || '',
                });
            }
            return out.reverse();
        }

        // ── State ─────────────────────────────────────────────────────────────────────
        let allData = [];
        let shuffledAllData = [];
        let modelMap = new Map();   // name → { name, slug, count }
        let curModel = null;
        let curVideo = null;
        let activePlayerIdx = 0;
        let searchQ = '';
        let debTimer = null;
        let currentTab = 'videos';  // 'models' or 'videos'
        let currentVideoPage = 1;
        const VIDEOS_PER_PAGE = 24;

        // ── DOM refs ──────────────────────────────────────────────────────────────────
        const $ = id => document.getElementById(id);
        const modelGrid = $('model-grid');
        const videoGrid = $('video-grid');
        const pageTitle = $('page-title');
        const homeLink = $('home-link');
        const backBtn = $('back-btn');
        const searchEl = $('search');
        const modal = $('modal');
        const modalVideo = $('modal-video');
        const mTitle = $('m-title');
        const mCat = $('m-cat');
        const mGuests = $('m-guests');
        const mId = $('m-id');
        const ptabs = $('ptabs');
        const dlLinks = $('dl-links');
        const tabContainer = $('tab-container');
        const paginationEl = $('pagination');

        // ── Case-insensitive model lookup ─────────────────────────────────────────────
        // Finds a model in modelMap regardless of casing (e.g. JackandJill vs JACKANDJILL)
        function getModel(name) {
            if (!name) return null;
            // First try exact match (fast path)
            if (modelMap.has(name)) return modelMap.get(name);
            // Fallback: case-insensitive search
            const upper = name.toUpperCase();
            for (const [key, val] of modelMap) {
                if (key.toUpperCase() === upper) return val;
            }
            return null;
        }

        // ── Lazy image helper ─────────────────────────────────────────────────────────
        function lazyImg(src, alt, fallback) {
            const img = document.createElement('img');
            img.dataset.src = src;
            img.alt = alt;
            img.decoding = 'async';
            img.onload = () => img.classList.add('loaded');
            img.onerror = () => { img.onerror = null; img.src = fallback; img.classList.add('loaded'); };
            imgObs.observe(img);
            return img;
        }

        // ── Build a single model card element ────────────────────────────────────────
        function makeModelCard(m) {
            const card = document.createElement('div');
            card.className = 'mcard';
            card.onclick = () => openModel(m);
            const imgWrap = document.createElement('div');
            imgWrap.className = 'mcard-img';
            const img = lazyImg(
                IMGS_PATH + m.slug + '?' + IMG_VERSION, m.name,
                `https://ui-avatars.com/api/?name=${encodeURIComponent(m.name)}&background=1e293b&color=fff&size=400`
            );
            imgWrap.appendChild(img);
            const grad = document.createElement('div');
            grad.className = 'mcard-grad';
            imgWrap.appendChild(grad);
            const cnt = document.createElement('span');
            cnt.className = 'mcard-count';
            cnt.textContent = m.count + ' videos';
            imgWrap.appendChild(cnt);
            const lbl = document.createElement('p');
            lbl.className = 'mcard-name';
            lbl.textContent = m.name;
            card.appendChild(imgWrap);
            card.appendChild(lbl);
            return card;
        }

        // ── Render model grid in idle chunks ──────────────────────────────────────────
        let _renderModelToken = 0;
        function renderModels() {
            const token = ++_renderModelToken;
            const q = searchQ.toLowerCase();
            const items = [];
            for (const [, m] of modelMap) {
                if (!q || m.name.toLowerCase().includes(q)) items.push(m);
            }

            modelGrid.innerHTML = '';

            if (items.length === 0) {
                const empty = document.createElement('p');
                empty.className = 'empty';
                empty.textContent = 'No models found.';
                modelGrid.appendChild(empty);
                return;
            }

            const CHUNK = 20;
            let idx = 0;

            function loadChunk() {
                if (token !== _renderModelToken) return;
                const frag = document.createDocumentFragment();
                const limit = Math.min(idx + CHUNK, items.length);
                while (idx < limit) frag.appendChild(makeModelCard(items[idx++]));
                modelGrid.appendChild(frag);

                if (idx < items.length) {
                    // Reposiciona sentinel depois dos novos cards
                    sentinel.remove();
                    modelGrid.appendChild(sentinel);
                } else {
                    sentinel.remove();
                    observer.disconnect();
                }
            }

            const sentinel = document.createElement('div');
            sentinel.style.cssText = 'grid-column:1/-1;height:1px';

            const observer = new IntersectionObserver(entries => {
                if (entries[0].isIntersecting) loadChunk();
            }, { rootMargin: '400px' });

            // Carrega primeiro chunk imediatamente, só depois ativa o observer
            loadChunk();
            modelGrid.appendChild(sentinel);
            observer.observe(sentinel);
            modelGrid.classList.add('fade-in');
        }

        // ── Build a single video card element ────────────────────────────────────────
        function makeVideoCard(v) {
            const card = document.createElement('div');
            card.className = 'vcard';
            card.onclick = () => openVideo(v);
            const thumb = document.createElement('div');
            thumb.className = 'vcard-thumb';
            const img = lazyImg(v.Thumb || v.Photo, v.ID, 'https://placehold.co/600x338/0f172a/1e293b?text=.');
            thumb.appendChild(img);
            const playWrap = document.createElement('div');
            playWrap.className = 'vcard-play';
            const circle = document.createElement('div');
            circle.className = 'play-circle';
            circle.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>`;
            playWrap.appendChild(circle);
            thumb.appendChild(playWrap);
            // Mostra o selo "Source Quality" se o vídeo tiver links de download na coluna I
            const colILinks = v.Category ? v.Category.split(',').map(l => l.trim()).filter(l => {
                const s = l.toLowerCase();
                return s.startsWith('http') || s.includes('://') || s.startsWith('www.');
            }) : [];
            if (colILinks.length > 0) {
                const cat = document.createElement('span');
                cat.className = 'vcard-cat';
                cat.textContent = 'Source Quality';
                thumb.appendChild(cat);
            }
            const info = document.createElement('div');
            info.className = 'vcard-info';

            if (!curModel) {
                const modelNameEl = document.createElement('p');
                modelNameEl.className = 'vcard-model-name';
                const m = getModel(v.ModelName);
                if (m) {
                    modelNameEl.innerHTML = `<a href="${modelUrl(m)}" onclick="event.stopPropagation();event.preventDefault();openModel(getModel('${v.ModelName.replace(/'/g, "\\'")}'))">${v.ModelName}</a>`;
                } else {
                    modelNameEl.textContent = v.ModelName;
                }
                info.appendChild(modelNameEl);
            }

            const idEl = document.createElement('p');
            idEl.className = 'vcard-id';
            idEl.textContent = 'ID: ' + v.ID;
            info.appendChild(idEl);

            // Monta w/ excluindo a modelo atual da página
            if (curModel) {
                const allParticipants = [v.ModelName, ...v.Guests.split(/[,&\/]+/).map(g => g.trim()).filter(Boolean)];
                const others = allParticipants.filter(n => n.toUpperCase() !== curModel.name.toUpperCase());
                if (others.length) {
                    const g = document.createElement('p');
                    g.className = 'vcard-guests';
                    g.innerHTML = 'w/ ' + others.map(n => {
                        const m = getModel(n);
                        if (m) return `<a href="${modelUrl(m)}" onclick="event.stopPropagation();event.preventDefault();openModel(getModel('${n.replace(/'/g, "\\'")}'))" style="color:inherit;text-decoration:underline;text-underline-offset:2px">${n}</a>`;
                        return n;
                    }).join(', ');
                    info.appendChild(g);
                }
            } else if (v.Guests) {
                const guestsList = v.Guests.split(/[,&\/]+/).map(g => g.trim()).filter(Boolean);
                if (guestsList.length) {
                    const g = document.createElement('p');
                    g.className = 'vcard-guests';
                    g.innerHTML = 'w/ ' + guestsList.map(n => {
                        const m = getModel(n);
                        if (m) return `<a href="${modelUrl(m)}" onclick="event.stopPropagation();event.preventDefault();openModel(getModel('${n.replace(/'/g, "\\'")}'))" style="color:inherit;text-decoration:underline;text-underline-offset:2px">${n}</a>`;
                        return n;
                    }).join(', ');
                    info.appendChild(g);
                }
            }

            card.appendChild(thumb);
            card.appendChild(info);
            return card;
        }

        // ── Render video grid in idle chunks ──────────────────────────────────────────
        let _renderVideoToken = 0;
        function renderVideos() {
            const token = ++_renderVideoToken;
            const q = searchQ.toLowerCase();
            const modelName = curModel.name;
            const items = allData.filter(v => {
                const isMain = v.ModelName.toUpperCase() === modelName.toUpperCase();
                const isGuest = v.Guests.split(/[,&\/]+/).map(g => g.trim().toUpperCase())
                    .includes(modelName.toUpperCase());
                if (!isMain && !isGuest) return false;
                if (!q) return true;
                return v.ID.toLowerCase().includes(q) ||
                    v.Guests.toLowerCase().includes(q) ||
                    v.Tags.some(t => t.toLowerCase().includes(q));
            });

            videoGrid.innerHTML = '';

            if (items.length === 0) {
                const empty = document.createElement('p');
                empty.className = 'empty';
                empty.textContent = 'No videos found.';
                videoGrid.appendChild(empty);
                return;
            }

            const CHUNK = 9;
            let idx = 0;

            function flush() {
                if (token !== _renderVideoToken) return;
                const frag = document.createDocumentFragment();
                const limit = Math.min(idx + CHUNK, items.length);
                while (idx < limit) frag.appendChild(makeVideoCard(items[idx++]));
                videoGrid.appendChild(frag);
                if (idx < items.length) setTimeout(flush, 0);
            }

            const firstFrag = document.createDocumentFragment();
            const firstLimit = Math.min(CHUNK, items.length);
            while (idx < firstLimit) firstFrag.appendChild(makeVideoCard(items[idx++]));
            videoGrid.appendChild(firstFrag);
            videoGrid.classList.add('fade-in');

            if (idx < items.length) setTimeout(flush, 0);
        }

        // ── Render all videos grid with pagination ────────────────────────────────────
        let _renderAllVideosToken = 0;
        function renderAllVideos() {
            const token = ++_renderAllVideosToken;
            const q = searchQ.toLowerCase();
            let items = shuffledAllData;
            if (q) {
                items = shuffledAllData.filter(v => {
                    return v.ModelName.toLowerCase().includes(q) ||
                        v.ID.toLowerCase().includes(q) ||
                        v.Guests.toLowerCase().includes(q) ||
                        v.Tags.some(t => t.toLowerCase().includes(q));
                });
            }

            videoGrid.innerHTML = '';

            if (items.length === 0) {
                const empty = document.createElement('p');
                empty.className = 'empty';
                empty.textContent = 'No videos found.';
                videoGrid.appendChild(empty);
                paginationEl.style.display = 'none';
                return;
            }

            const totalPages = Math.ceil(items.length / VIDEOS_PER_PAGE);
            if (currentVideoPage < 1) currentVideoPage = 1;
            if (currentVideoPage > totalPages) currentVideoPage = totalPages;

            const startIdx = (currentVideoPage - 1) * VIDEOS_PER_PAGE;
            const pageItems = items.slice(startIdx, startIdx + VIDEOS_PER_PAGE);

            // Marca os vídeos exibidos nesta página como vistos para não repetir no F5
            if (!q) {
                markVideosAsSeen(pageItems);
            }

            const frag = document.createDocumentFragment();
            pageItems.forEach(v => {
                frag.appendChild(makeVideoCard(v));
            });
            videoGrid.appendChild(frag);
            videoGrid.classList.add('fade-in');

            renderPagination(items.length, currentVideoPage, (newPage) => {
                currentVideoPage = newPage;
                const url = new URL(window.location.href);
                url.searchParams.set('tab', 'videos');
                url.searchParams.set('page', newPage);
                history.pushState({ tab: 'videos', page: newPage }, '', url.pathname + url.search);
                renderAllVideos();
            });
        }

        function renderPagination(totalItems, currentPage, onPageChange) {
            paginationEl.innerHTML = '';
            const totalPages = Math.ceil(totalItems / VIDEOS_PER_PAGE);
            if (totalPages <= 1) {
                paginationEl.style.display = 'none';
                return;
            }
            paginationEl.style.display = 'flex';

            function createBtn(label, page, active = false, disabled = false) {
                const btn = document.createElement('button');
                btn.className = 'pg-btn';
                if (active) btn.classList.add('active');
                if (disabled) btn.classList.add('disabled');
                btn.textContent = label;
                if (!disabled) {
                    btn.onclick = () => {
                        window.scrollTo({ top: 0, behavior: 'instant' });
                        onPageChange(page);
                    };
                }
                return btn;
            }

            paginationEl.appendChild(createBtn('‹', currentPage - 1, false, currentPage === 1));

            const range = 1;
            let pages = [];
            pages.push(1);

            let start = Math.max(2, currentPage - range);
            let end = Math.min(totalPages - 1, currentPage + range);

            if (start > 2) {
                pages.push('...');
            }

            for (let i = start; i <= end; i++) {
                pages.push(i);
            }

            if (end < totalPages - 1) {
                pages.push('...');
            }

            if (totalPages > 1) {
                pages.push(totalPages);
            }

            pages.forEach(p => {
                if (p === '...') {
                    const dots = document.createElement('span');
                    dots.className = 'pg-dots';
                    dots.textContent = '...';
                    paginationEl.appendChild(dots);
                } else {
                    paginationEl.appendChild(createBtn(p, p, p === currentPage));
                }
            });

            paginationEl.appendChild(createBtn('›', currentPage + 1, false, currentPage === totalPages));
        }

        function getQueryParam(name) {
            const params = new URLSearchParams(location.search);
            return params.get(name);
        }

        // ── Routing helpers ───────────────────────────────────────────────────────────
        const BASE = ''; // custom domain at root

        function modelUrl(m) {
            return BASE + '/model/' + nameToSlug(m.name);
        }

        let slugMap = new Map();
        function buildSlugMap() {
            slugMap.clear();
            for (const [, m] of modelMap) slugMap.set(nameToSlug(m.name), m);
        }

        // ── Navigation ────────────────────────────────────────────────────────────────
        function openModel(m, replaceState) {
            curModel = m;
            searchQ = '';
            searchEl.value = '';
            searchEl.placeholder = `Search in ${m.name}…`;
            if (homeLink) homeLink.textContent = m.name;
            else pageTitle.textContent = m.name;
            document.title = m.name + ' — RIPNSFW';
            backBtn.style.display = 'flex';
            tabContainer.style.display = 'none';
            modelGrid.style.display = 'none';
            videoGrid.style.display = 'grid';
            paginationEl.style.display = 'none';
            renderVideos();
            window.scrollTo({ top: 0, behavior: 'instant' });
            const url = modelUrl(m);
            if (replaceState) history.replaceState({ model: m.name }, '', url);
            else history.pushState({ model: m.name }, '', url);
        }
        function goBack(fromPopState) {
            curModel = null;
            searchQ = '';
            searchEl.value = '';
            searchEl.placeholder = currentTab === 'models' ? 'Search model…' : 'Search video…';
            if (homeLink) homeLink.textContent = 'RIPNSFW';
            else pageTitle.textContent = 'RIPNSFW';
            document.title = 'RIPNSFW';
            backBtn.style.display = 'none';
            tabContainer.style.display = 'flex';
            
            if (currentTab === 'models') {
                videoGrid.style.display = 'none';
                modelGrid.style.display = 'grid';
                paginationEl.style.display = 'none';
                renderModels();
            } else {
                modelGrid.style.display = 'none';
                videoGrid.style.display = 'grid';
                renderAllVideos();
            }
            window.scrollTo({ top: 0, behavior: 'instant' });
            if (!fromPopState) {
                const url = new URL(window.location.href);
                if (currentTab === 'videos') {
                    url.searchParams.set('tab', 'videos');
                    url.searchParams.set('page', currentVideoPage);
                } else {
                    url.searchParams.delete('tab');
                    url.searchParams.delete('page');
                }
                history.pushState({}, '', url.pathname + url.search);
            }
        }

        window.addEventListener('popstate', () => {
            const { modelSlug, videoId } = parsePath();

            if (modelSlug && videoId) {
                const m = slugMap.get(modelSlug);
                if (m) {
                    if (!curModel || curModel.name !== m.name) openModel(m, true);
                    const v = allData.find(r => r.ID === videoId);
                    if (v) { openVideo(v, true); return; }
                }
            }

            if (modelSlug) {
                if (curVideo) { closeModal(true); return; }
                const m = slugMap.get(modelSlug);
                if (m) { openModel(m, true); return; }
            }

            if (curVideo) { closeModal(true); return; }
            if (curModel) { goBack(true); return; }

            // Fallback: voltou para home sem modelo/video ativo
            const tabParam = getQueryParam('tab');
            const pageParam = parseInt(getQueryParam('page'), 10);

            curModel = null;
            curVideo = null;
            searchQ = '';
            searchEl.value = '';
            tabContainer.style.display = 'flex';

            if (tabParam === 'videos') {
                currentTab = 'videos';
                currentVideoPage = pageParam || 1;
                $('tab-models').classList.remove('active');
                $('tab-videos').classList.add('active');
                searchEl.placeholder = 'Search video…';
                modelGrid.style.display = 'none';
                videoGrid.style.display = 'grid';
                renderAllVideos();
            } else {
                currentTab = 'models';
                $('tab-models').classList.add('active');
                $('tab-videos').classList.remove('active');
                searchEl.placeholder = 'Search model…';
                videoGrid.style.display = 'none';
                modelGrid.style.display = 'grid';
                paginationEl.style.display = 'none';
                renderModels();
            }
            window.scrollTo({ top: 0, behavior: 'instant' });
        });

        function parsePath() {
            const match = location.pathname.match(/\/model\/([^\/]+)(?:\/([^\/]+))?/);
            if (!match) return {};
            return { modelSlug: match[1], videoId: match[2] ? decodeURIComponent(match[2]) : null };
        }
        function getSlugFromPath() { return parsePath().modelSlug || null; }

        // ── Modal ─────────────────────────────────────────────────────────────────────
        const EXT_ICON = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`;

        function buildPlayers(v) {
            const data = [
                { embed: v.Embed1, dl: v.Link1, label: 'Player 1' },
                { embed: v.Embed2, dl: v.Link2, label: 'Player 2' },
                { embed: v.Embed3, dl: v.Link3, label: 'Player 3' },
            ].filter(p => p.embed);
            return data;
        }

        function setActivePlayer(players, idx) {
            activePlayerIdx = idx;
            const old = modalVideo.querySelector('iframe');
            if (old) old.remove();
            if (players[idx]) {
                const iframe = document.createElement('iframe');
                iframe.src = players[idx].embed;
                iframe.allowFullscreen = true;
                iframe.setAttribute('allowfullscreen', '');
                modalVideo.insertBefore(iframe, modalVideo.firstChild);
            }
            const tabs = ptabs.querySelectorAll('.ptab');
            tabs.forEach((t, i) => t.classList.toggle('active', i === idx));
        }

        function openVideo(v, replaceState) {
            curVideo = v;
            const players = buildPlayers(v);

            const displayName = curModel ? curModel.name : v.ModelName;
            mTitle.textContent = displayName;
            mCat.textContent = ''; // Column I (previously Category) removed from modal display

            // Monta lista de "w/" excluindo a modelo atual da página
            const allParticipants = [v.ModelName, ...v.Guests.split(/[,&\/]+/).map(g => g.trim()).filter(Boolean)];
            const others = allParticipants.filter(n => n.toUpperCase() !== displayName.toUpperCase());
            if (others.length) {
                mGuests.style.display = '';
                mGuests.innerHTML = 'w/ ' + others.map(n => {
                    const m = getModel(n);
                    if (m) return `<a href="${modelUrl(m)}" onclick="event.preventDefault();closeModal(false);openModel(getModel('${n.replace(/'/g, "\\'")}'))" style="color:inherit;text-decoration:underline;text-underline-offset:2px">${n}</a>`;
                    return n;
                }).join(', ');
            } else {
                mGuests.style.display = 'none';
                mGuests.innerHTML = '';
            }

            mId.textContent = 'ID: ' + v.ID;
            mCat.style.display = 'none'; // Column I (previously Category) display disabled

            const defaultIdx = 0;

            ptabs.innerHTML = '';
            if (players.length > 1) {
                players.forEach((p, i) => {
                    const btn = document.createElement('button');
                    btn.className = 'ptab' + (i === defaultIdx ? ' active' : '');
                    btn.textContent = p.label;
                    btn.onclick = () => setActivePlayer(players, i);
                    ptabs.appendChild(btn);
                });
                ptabs.style.display = 'flex';
            } else {
                ptabs.style.display = 'none';
            }

            dlLinks.innerHTML = '';
            const colILinks = v.Category ? v.Category.split(',').map(l => l.trim()).filter(l => {
                const s = l.toLowerCase();
                return s.startsWith('http') || s.includes('://') || s.startsWith('www.');
            }) : [];

            if (colILinks.length > 0) {
                colILinks.forEach((link, i) => {
                    const a = document.createElement('a');
                    a.href = link.startsWith('www.') ? 'https://' + link : link;
                    a.target = '_blank';
                    a.rel = 'noopener noreferrer';
                    a.className = 'dl-link ' + (i === 0 ? 'primary' : 'secondary');
                    a.innerHTML = 'Download Source ' + (i + 1) + ' ' + EXT_ICON;
                    dlLinks.appendChild(a);
                });
            } else if (players.length === 0) {
                dlLinks.innerHTML = '<p class="no-links">No links available.</p>';
            } else {
                players.forEach((p, i) => {
                    if (!p.dl) return;
                    const a = document.createElement('a');
                    a.href = p.dl;
                    a.target = '_blank';
                    a.rel = 'noopener noreferrer';
                    a.className = 'dl-link ' + (i === defaultIdx ? 'primary' : 'secondary');
                    a.innerHTML = 'Download ' + (i + 1) + ' ' + EXT_ICON;
                    dlLinks.appendChild(a);
                });
            }

            setActivePlayer(players, defaultIdx);
            modal.classList.add('open');
            document.body.style.overflow = 'hidden';

            const mSlug = nameToSlug(v.ModelName);
            const url = BASE + '/model/' + mSlug + '/' + encodeURIComponent(v.ID);
            if (replaceState) history.replaceState({ model: v.ModelName, videoId: v.ID }, '', url);
            else history.pushState({ model: v.ModelName, videoId: v.ID }, '', url);
        }

        function closeModal(fromPopState) {
            modal.classList.remove('open');
            document.body.style.overflow = '';
            const iframe = modalVideo.querySelector('iframe');
            if (iframe) iframe.remove();
            curVideo = null;
            if (!fromPopState) {
                if (curModel) {
                    history.pushState({ model: curModel.name }, '', modelUrl(curModel));
                } else {
                    const url = new URL(window.location.href);
                    if (currentTab === 'videos') {
                        url.searchParams.set('tab', 'videos');
                        url.searchParams.set('page', currentVideoPage);
                    } else {
                        url.searchParams.delete('tab');
                        url.searchParams.delete('page');
                    }
                    history.pushState({}, '', url.pathname + url.search);
                }
            }
        }

        // ── Search ────────────────────────────────────────────────────────────────────
        searchEl.addEventListener('input', e => {
            clearTimeout(debTimer);
            debTimer = setTimeout(() => {
                searchQ = e.target.value.trim();
                if (curModel) renderVideos();
                else if (currentTab === 'videos') {
                    currentVideoPage = 1;
                    renderAllVideos();
                } else renderModels();
            }, 280);
        });

        // ── Events ────────────────────────────────────────────────────────────────────
        backBtn.onclick = () => goBack(false);

        $('tab-models').onclick = () => {
            if (currentTab === 'models') return;
            currentTab = 'models';
            $('tab-models').classList.add('active');
            $('tab-videos').classList.remove('active');

            searchEl.value = '';
            searchQ = '';
            searchEl.placeholder = 'Search model…';

            videoGrid.style.display = 'none';
            modelGrid.style.display = 'grid';
            paginationEl.style.display = 'none';

            history.pushState({ tab: 'models' }, '', BASE + '/');
            renderModels();
        };

        $('tab-videos').onclick = () => {
            if (currentTab === 'videos') return;
            currentTab = 'videos';
            $('tab-models').classList.remove('active');
            $('tab-videos').classList.add('active');

            searchEl.value = '';
            searchQ = '';
            searchEl.placeholder = 'Search video…';

            modelGrid.style.display = 'none';
            videoGrid.style.display = 'grid';

            currentVideoPage = 1;
            history.pushState({ tab: 'videos', page: 1 }, '', BASE + '/?tab=videos&page=1');
            renderAllVideos();
        };

        if (homeLink) {
            homeLink.onclick = (e) => {
                e.preventDefault();
                if (curVideo) { closeModal(false); return; }
                if (curModel) { goBack(false); return; }
                
                // Force reset to videos tab on home link click
                currentTab = 'videos';
                $('tab-videos').classList.add('active');
                $('tab-models').classList.remove('active');
                tabContainer.style.display = 'flex';

                searchEl.value = '';
                searchQ = '';
                searchEl.placeholder = 'Search video…';

                modelGrid.style.display = 'none';
                videoGrid.style.display = 'grid';

                currentVideoPage = 1;

                if (location.pathname !== (BASE + '/') || location.search !== '') {
                    history.pushState({ tab: 'videos', page: 1 }, '', BASE + '/');
                }
                renderAllVideos();
                window.scrollTo({ top: 0, behavior: 'instant' });
            };
        }
        const closeDeskBtn = $('close-desk');
        if (closeDeskBtn) closeDeskBtn.onclick = () => closeModal(false);
        const closeMobBtn = $('close-mob');
        if (closeMobBtn) closeMobBtn.onclick = () => closeModal(false);
        modal.addEventListener('click', e => { if (e.target === modal) closeModal(false); });
        document.addEventListener('keydown', e => { if (e.key === 'Escape' && curVideo) closeModal(false); });

        // ── Init ──────────────────────────────────────────────────────────────────────
        const CACHE_KEY = 'ep_csv_v8'; // v8: switched to local data.csv with local thumbs support
        const CACHE_TTL = 30 * 60 * 1000;

        // Wipe old cache keys
        ['ep_csv_cache', 'ep_csv_v2', 'ep_csv_v3', 'ep_csv_v4', 'ep_csv_v5', 'ep_csv_v6', 'ep_csv_v7'].forEach(k => { try { localStorage.removeItem(k); } catch { } });

        function saveCache(csv) {
            try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), csv })); } catch { }
        }

        const FALLBACK_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSs1GhZQnhVZLayT56Ik4zsE2GaWyVV6A0IeUz6YSMKGSN9jnmXjpWtIVbfUsXH1_Os17RG_oju8Ba3/pub?gid=0&single=true&output=csv';

        function fetchFresh(onDone) {
            // Adiciona timestamp (?t=...) para evitar cache de requisição HTTP do arquivo data.csv
            fetch(SHEET_URL + '?t=' + Date.now())
                .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
                .then(csv => { saveCache(csv); onDone && onDone(csv); })
                .catch(() => {
                    // data.csv não encontrado — tenta Google Sheets como fallback
                    fetch(FALLBACK_URL + '&t=' + Date.now())
                        .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
                        .then(csv => { saveCache(csv); onDone && onDone(csv); })
                        .catch(() => {
                            $('spinner').innerHTML = '<p style="color:#ef4444;font-size:.85rem">Failed to load data.</p>';
                        });
                });
        }

        function processCSV(csv) {
            allData = parseCSV(csv);
            // Separa os vídeos vistos dos não vistos para priorizar os não vistos no embaralhamento
            try {
                const seen = JSON.parse(sessionStorage.getItem('seen_videos') || '[]');
                const seenSet = new Set(seen);
                let unseen = allData.filter(v => !seenSet.has(v.ID));
                let seenVideos = allData.filter(v => seenSet.has(v.ID));
                
                // Se restar menos de uma página de vídeos não vistos, reinicia a lista
                if (unseen.length < VIDEOS_PER_PAGE) {
                    sessionStorage.removeItem('seen_videos');
                    unseen = [...allData];
                    seenVideos = [];
                }
                
                shuffleArray(unseen);
                shuffleArray(seenVideos);
                shuffledAllData = [...unseen, ...seenVideos];
            } catch (e) {
                shuffledAllData = [...allData];
                shuffleArray(shuffledAllData);
            }
            const tempMap = new Map();

            // Conta vídeos onde a modelo é a principal
            for (let i = 0; i < allData.length; i++) {
                const n = allData[i].ModelName;
                if (!tempMap.has(n)) tempMap.set(n, { name: n, slug: toSlug(n), count: 0, firstIdx: i });
                tempMap.get(n).count++;
            }

            // Conta também aparições como convidada (coluna H / Guests) — case-insensitive
            for (let i = 0; i < allData.length; i++) {
                const row = allData[i];
                if (!row.Guests) continue;
                row.Guests.split(/[,&\/]+/).map(g => g.trim()).forEach(gName => {
                    if (!gName) return;
                    if (IGNORED.has(gName.toUpperCase())) return;
                    const existingKey = [...tempMap.keys()].find(k => k.toUpperCase() === gName.toUpperCase());
                    if (existingKey) {
                        const m = tempMap.get(existingKey);
                        m.count++;
                        if (i < m.firstIdx) m.firstIdx = i;
                    } else {
                        tempMap.set(gName, { name: gName, slug: toSlug(gName), count: 1, firstIdx: i });
                    }
                });
            }

            const sorted = [...tempMap.values()]
                .filter(m => m.count > 1 && !IGNORED.has(m.name.toUpperCase()))
                .sort((a, b) => a.firstIdx - b.firstIdx);
            modelMap = new Map(sorted.map(m => [m.name, m]));
            buildSlugMap();

            window._secDone(() => {
                $('app').style.display = '';
                const { modelSlug, videoId } = parsePath();
                if (modelSlug && slugMap.has(modelSlug)) {
                    const m = slugMap.get(modelSlug);
                    openModel(m, true);
                    if (videoId) {
                        const v = allData.find(r => r.ID === videoId);
                        if (v) openVideo(v, true);
                    }
                } else {
                    if (modelSlug) history.replaceState({}, '', BASE + '/');

                    const tabParam = getQueryParam('tab');
                    const pageParam = parseInt(getQueryParam('page'), 10);

                    if (tabParam === 'videos') {
                        currentTab = 'videos';
                        currentVideoPage = pageParam || 1;
                        $('tab-models').classList.remove('active');
                        $('tab-videos').classList.add('active');
                        searchEl.placeholder = 'Search video…';
                        modelGrid.style.display = 'none';
                        videoGrid.style.display = 'grid';
                        renderAllVideos();
                    } else {
                        currentTab = 'models';
                        $('tab-models').classList.add('active');
                        $('tab-videos').classList.remove('active');
                        searchEl.placeholder = 'Search model…';
                        videoGrid.style.display = 'none';
                        modelGrid.style.display = 'grid';
                        paginationEl.style.display = 'none';
                        renderModels();
                    }
                }
            });
        }

        (function init() {
            // Carrega blacklist.txt e CSV em paralelo
            const blFetch = fetch('/blacklist.txt')
                .then(r => r.ok ? r.text() : '')
                .then(txt => {
                    IGNORED = new Set(
                        txt.split('\n').map(l => l.trim().toUpperCase()).filter(Boolean)
                    );
                })
                .catch(() => {}); // falha silenciosa: mantém IGNORED vazio

            let served = false;
            try {
                const raw = localStorage.getItem(CACHE_KEY);
                if (raw) {
                    const { ts, csv } = JSON.parse(raw);
                    served = true;
                    blFetch.then(() => {
                        processCSV(csv);
                        if (Date.now() - ts > CACHE_TTL) fetchFresh(processCSV);
                    });
                }
            } catch { }
            if (!served) blFetch.then(() => fetchFresh(csv => processCSV(csv)));
        })();
    </script>

    <!-- Scroll buttons (above CTA) -->
    <style>
        #scroll-btns {
            position: fixed;
            bottom: 5.5rem;
            right: 1.5rem;
            z-index: 998;
            display: flex;
            flex-direction: column;
            gap: .4rem;
            opacity: 0;
            transform: translateY(16px);
            transition: opacity .4s ease, transform .4s ease;
            pointer-events: none;
        }

        #scroll-btns.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .scroll-btn {
            width: 2.5rem;
            height: 2.5rem;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 50%;
            color: #94a3b8;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background .15s, color .15s;
        }

        .scroll-btn:hover {
            background: rgba(30, 41, 59, 0.95);
            color: #fff;
        }
    </style>

    <div id="scroll-btns">
        <button class="scroll-btn" id="scroll-top" aria-label="Ir ao topo" title="Topo">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 15l-6-6-6 6" />
            </svg>
        </button>
        <button class="scroll-btn" id="scroll-bottom" aria-label="Ir ao fim" title="Fim">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M6 9l6 6 6-6" />
            </svg>
        </button>
    </div>

    <script>
        (function () {
            const btns = document.getElementById('scroll-btns');

            window.addEventListener('scroll', function () {
                const scrolled = window.scrollY > 300;
                btns.classList.toggle('visible', scrolled);
            }, { passive: true });

            document.getElementById('scroll-top').onclick = function () {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };
            document.getElementById('scroll-bottom').onclick = function () {
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            };
        })();
    </script>
