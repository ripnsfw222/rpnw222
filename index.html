<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exclusive Portal - Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            background-color: #020617;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.98);
            backdrop-filter: blur(20px);
        }

        .animate-in {
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Smooth transitions for images */
        img { 
            transition: opacity 0.5s ease-in-out;
            content-visibility: auto; 
        }

        .custom-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: rgba(236, 72, 153, 0.5);
            border-radius: 10px;
        }

        /* Performance boost: prevent layout shift */
        .aspect-card {
            aspect-ratio: 3/4;
        }
        .aspect-video-box {
            aspect-ratio: 16/9;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // PERFORMANCE TIP: If you move this to GitHub, replace this URL with your raw GitHub URL
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSs1GhZQnhVZLayT56Ik4zsE2GaWyVV6A0IeUz6YSMKGSN9jnmXjpWtIVbfUsXH1_Os17RG_oju8Ba3/pub?gid=0&single=true&output=csv";
        const MODEL_PHOTOS_PATH = "./imgs/";

        const fixDoodUrl = (url) => {
            if (!url) return "";
            return url.replace("/d/", "/e/");
        };

        const formatImageFileName = (name) => {
            if (!name) return "";
            return name
                .toLowerCase()
                .trim()
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .replace(/\s+/g, '-')
                + ".jpg";
        };

        function parseCSV(csvText) {
            const IGNORED_NAMES = ["NAME", "TEST", "MODEL", "EMPTY", "ALINA", "ANNA", "BANANAPOTATO333", "ERIN", "IZZY", "JUNIPER", "KATERINA", "LUCY", "MISTY", "NAKEDBARBIEDOLL", "NINA", "NIKOLETTA QUEEN", "RAINI", "SCARLETT", "SCARLETT HAMPTOM", "SHYLA", "TESSA", "THEODORA", "VIOLET RAY", "WILD HALLI", "YUIWOO"];
            const lines = csvText.trim().split('\n');
            if (lines.length < 2) return [];
            
            // Map data efficiently
            const parsedData = [];
            for (let i = 1; i < lines.length; i++) {
                const values = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (!values[2]) continue;

                const name = values[2].trim();
                const nameUpper = name.toUpperCase();
                
                if (IGNORED_NAMES.includes(nameUpper)) continue;

                let embedUrl = values[6]?.trim() || "";
                if (embedUrl.includes("doodstream") || embedUrl.includes("dood.")) {
                    embedUrl = fixDoodUrl(embedUrl);
                }

                parsedData.push({
                    ModelPhoto: values[0]?.trim() || '',
                    ModelName: name,
                    Link1: values[3]?.trim() || '',
                    Link2: values[4]?.trim() || '',
                    Link3: values[5]?.trim() || '',
                    EmbedVideo: embedUrl,
                    Guests: values[7]?.trim() || '',
                    Category: values[8]?.trim() || '',
                    ID: values[10]?.trim() || '',
                    Tags: values[11]?.replace(/"/g, '').trim() || '',
                    VideoThumbnail: values[14]?.trim() || ''
                });
            }

            return parsedData.reverse();
        }

        const App = () => {
            const [data, setData] = useState([]);
            const [selectedModel, setSelectedModel] = useState(null);
            const [selectedVideo, setSelectedVideo] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const fetchData = async () => {
                    try {
                        const response = await fetch(SHEET_CSV_URL);
                        const text = await response.text();
                        setData(parseCSV(text));
                    } catch (error) {
                        console.error("Data loading error:", error);
                    } finally {
                        setLoading(false);
                    }
                };
                fetchData();
            }, []);

            useEffect(() => {
                if (!loading && window.lucide) lucide.createIcons();
            }, [loading, selectedModel, selectedVideo]);

            const models = useMemo(() => {
                const map = new Map();
                data.forEach(item => {
                    const name = item.ModelName;
                    if (!map.has(name)) {
                        map.set(name, {
                            name: name,
                            image: MODEL_PHOTOS_PATH + formatImageFileName(name),
                            videoCount: 0
                        });
                    }
                    map.get(name).videoCount++;
                });

                return Array.from(map.values())
                    .filter(model => model.videoCount > 1) 
                    .sort((a, b) => a.name.localeCompare(b.name));
            }, [data]);

            const currentVideos = useMemo(() => {
                return selectedModel ? data.filter(v => v.ModelName === selectedModel.name) : [];
            }, [selectedModel, data]);

            if (loading) return (
                <div className="flex h-screen items-center justify-center bg-slate-950">
                    <div className="flex flex-col items-center gap-4">
                        <div className="animate-spin rounded-full h-10 w-10 border-t-2 border-pink-500 border-r-2 border-r-transparent"></div>
                        <span className="text-slate-500 text-[10px] font-black uppercase tracking-[0.3em]">Initialising Gallery...</span>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen pb-10 bg-slate-950 text-slate-200">
                    <header className="bg-slate-900/40 backdrop-blur-2xl p-4 sticky top-0 z-40 border-b border-white/5">
                        <div className="max-w-7xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                {selectedModel && (
                                    <button onClick={() => setSelectedModel(null)} className="p-2 hover:bg-white/10 rounded-full transition-all text-white active:scale-90">
                                        <i data-lucide="arrow-left" className="w-5 h-5"></i>
                                    </button>
                                )}
                                <h1 className="text-xl font-black italic uppercase tracking-tighter text-white">
                                    {selectedModel ? selectedModel.name : 'Exclusive Portal'}
                                </h1>
                            </div>
                            {!selectedModel && (
                                <div className="text-[10px] font-bold text-slate-500 uppercase tracking-widest bg-white/5 px-3 py-1 rounded-full border border-white/5">
                                    {models.length} Models
                                </div>
                            )}
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto p-4 md:p-8">
                        {!selectedModel ? (
                            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4 md:gap-6 animate-in">
                                {models.map((model, idx) => (
                                    <div key={idx} onClick={() => setSelectedModel(model)} className="group cursor-pointer">
                                        <div className="relative aspect-card rounded-2xl overflow-hidden mb-3 ring-1 ring-white/10 group-hover:ring-pink-500 transition-all duration-500 shadow-2xl bg-slate-900">
                                            <img 
                                                src={model.image} 
                                                className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700"
                                                loading="lazy"
                                                alt={model.name}
                                                onError={(e) => {
                                                    e.target.onerror = null;
                                                    e.target.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(model.name)}&background=1e293b&color=fff&size=512`;
                                                }} 
                                            />
                                            <div className="absolute inset-0 bg-gradient-to-t from-black/95 via-transparent to-transparent opacity-80 group-hover:opacity-90 transition-opacity"></div>
                                            <div className="absolute bottom-3 left-3">
                                                <p className="text-[9px] font-black text-pink-500 uppercase tracking-widest">{model.videoCount} Videos</p>
                                            </div>
                                        </div>
                                        <h3 className="text-center font-bold text-sm text-slate-400 group-hover:text-white transition-colors">{model.name}</h3>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 animate-in">
                                {currentVideos.map((video, idx) => (
                                    <div key={idx} onClick={() => setSelectedVideo(video)} className="bg-slate-900/30 rounded-2xl overflow-hidden cursor-pointer hover:bg-slate-900/60 transition-all border border-white/5 group">
                                        <div className="relative aspect-video-box bg-slate-800">
                                            <img 
                                                src={video.VideoThumbnail || video.ModelPhoto} 
                                                className="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-all duration-500" 
                                                loading="lazy"
                                                onError={(e) => {
                                                    e.target.onerror = null;
                                                    e.target.src = "https://placehold.co/600x400/1e293b/white?text=Video+Thumbnail";
                                                }}
                                            />
                                            <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all duration-300 bg-black/50 backdrop-blur-[2px]">
                                                <div className="w-14 h-14 bg-pink-600 rounded-full flex items-center justify-center shadow-2xl transform scale-75 group-hover:scale-100 transition-transform">
                                                    <i data-lucide="play" className="w-6 h-6 fill-white text-white"></i>
                                                </div>
                                            </div>
                                            <div className="absolute top-3 right-3 bg-black/70 backdrop-blur-md px-2 py-1 rounded text-[9px] font-bold uppercase border border-white/10 text-white tracking-tighter">
                                                {video.Category}
                                            </div>
                                        </div>
                                        <div className="p-5">
                                            <h4 className="font-bold text-slate-100 text-sm mb-1 truncate">ID: {video.ID}</h4>
                                            {video.Guests && <p className="text-[10px] text-pink-500 font-bold uppercase mb-3 tracking-wide">w/ {video.Guests}</p>}
                                            <div className="flex flex-wrap gap-1.5">
                                                {video.Tags && video.Tags.split(',').slice(0, 3).map((tag, i) => (
                                                    <span key={i} className="text-[8px] bg-white/5 text-slate-500 px-2 py-0.5 rounded uppercase font-bold border border-white/5">{tag.trim()}</span>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {selectedVideo && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay overflow-y-auto animate-in">
                            <div className="bg-slate-950 w-full max-w-6xl rounded-[2rem] overflow-hidden shadow-2xl border border-white/10 flex flex-col lg:flex-row max-h-[92vh]">
                                <div className="flex-[2.5] bg-black aspect-video lg:aspect-auto relative">
                                    <iframe src={selectedVideo.EmbedVideo} className="w-full h-full" frameBorder="0" allowFullScreen></iframe>
                                    <button onClick={() => setSelectedVideo(null)} className="absolute top-4 right-4 lg:hidden bg-black/60 p-3 rounded-full text-white backdrop-blur-md">
                                        <i data-lucide="x" className="w-5 h-5"></i>
                                    </button>
                                </div>
                                <div className="flex-1 p-8 lg:p-10 flex flex-col justify-between overflow-y-auto custom-scroll border-l border-white/5 bg-slate-900/20">
                                    <div>
                                        <div className="hidden lg:flex justify-end mb-6">
                                            <button onClick={() => setSelectedVideo(null)} className="text-slate-500 hover:text-white transition-colors p-2 hover:bg-white/5 rounded-full">
                                                <i data-lucide="x" className="w-7 h-7"></i>
                                            </button>
                                        </div>
                                        <h2 className="text-3xl font-black uppercase italic leading-tight mb-2 text-white tracking-tighter">{selectedVideo.ModelName}</h2>
                                        <p className="text-pink-500 font-black text-xs mb-10 tracking-[0.2em] uppercase">
                                            {selectedVideo.Guests ? `FEATURING: ${selectedVideo.Guests}` : selectedVideo.Category}
                                        </p>
                                        
                                        <div className="space-y-3">
                                            <p className="text-[10px] font-bold text-slate-500 uppercase mb-3 tracking-widest">Access Options</p>
                                            
                                            {[
                                                { url: selectedVideo.Link1, label: "Primary Server", color: "bg-pink-600 hover:bg-pink-700 shadow-pink-600/20" },
                                                { url: selectedVideo.Link2, label: "Backup Mirror 01", color: "bg-slate-800 hover:bg-slate-700 shadow-black/40" },
                                                { url: selectedVideo.Link3, label: "Backup Mirror 02", color: "bg-slate-800 hover:bg-slate-700 shadow-black/40" }
                                            ].map((link, idx) => link.url && link.url.length > 5 ? (
                                                <a 
                                                    key={idx}
                                                    href={link.url} 
                                                    target="_blank" 
                                                    className={`flex items-center justify-between w-full p-4 rounded-2xl transition-all font-black text-[11px] uppercase text-white shadow-xl active:scale-[0.98] ${link.color}`}
                                                >
                                                    {link.label} 
                                                    <i data-lucide="external-link" className="w-4 h-4 opacity-50"></i>
                                                </a>
                                            ) : null)}
                                        </div>
                                    </div>
                                    <div className="mt-12">
                                        <p className="text-[9px] font-bold text-slate-600 uppercase mb-3 tracking-widest">Metadata Tags</p>
                                        <div className="flex flex-wrap gap-1.5">
                                            {selectedVideo.Tags && selectedVideo.Tags.split(',').map((tag, i) => (
                                                <span key={i} className="text-[9px] border border-white/5 bg-white/5 text-slate-400 px-3 py-1.5 rounded-lg font-bold uppercase">{tag.trim()}</span>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
