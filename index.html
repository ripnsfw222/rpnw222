<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exclusive Portal - Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { margin:0; background:#020617; color:white; font-family:'Inter',sans-serif; overflow-x:hidden; }

        .animate-in { animation: fadeIn 0.25s ease-out both; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

        .custom-scroll::-webkit-scrollbar { width:4px; }
        .custom-scroll::-webkit-scrollbar-track { background:rgba(255,255,255,0.04); }
        .custom-scroll::-webkit-scrollbar-thumb { background:rgba(236,72,153,0.5); border-radius:10px; }

        .ratio-card  { aspect-ratio:3/4; }
        .ratio-video { aspect-ratio:16/9; }

        /* Lazy images */
        .lazy-img { opacity:0; transition:opacity 0.3s ease; display:block; width:100%; height:100%; object-fit:cover; }
        .lazy-img.loaded { opacity:1; }

        /* Card hover — GPU only, no JS */
        .card-thumb { overflow:hidden; position:relative; }
        .card-thumb .lazy-img { transform:translateZ(0); transition:transform 0.45s ease, opacity 0.3s ease; will-change:transform; }
        .card-thumb:hover .lazy-img { transform:scale(1.05) translateZ(0); }
        .play-overlay { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.4); opacity:0; transition:opacity 0.2s ease; }
        .card-thumb:hover .play-overlay { opacity:1; }

        .modal-bg { background:rgba(0,0,0,0.97); backdrop-filter:blur(18px); }

        /* Modal — mobile: sheet from bottom, desktop: centered */
        .modal-inner {
            display:flex; flex-direction:column;
            width:100%; max-width:920px;
            border-radius:1.25rem 1.25rem 0 0;
            overflow:hidden;
            border:1px solid rgba(255,255,255,0.07);
            background:#0b1223;
            max-height:92dvh;
        }
        .modal-video-side {
            position:relative; width:100%; aspect-ratio:16/9;
            background:#000; flex-shrink:0;
        }
        .modal-video-side iframe { position:absolute; inset:0; width:100%; height:100%; border:none; }
        .modal-info-side { flex:1; padding:1rem 1.25rem 1.5rem; overflow-y:auto; min-height:0; }

        @media(min-width:640px){
            .modal-inner { border-radius:1.5rem; max-height:88dvh; }
        }
        @media(min-width:768px){
            .modal-inner { flex-direction:row; }
            .modal-video-side { flex:2; aspect-ratio:unset; min-height:300px; }
            .modal-info-side  { width:260px; flex:none; padding:1.5rem 1.75rem; }
        }
        @media(min-width:1024px){
            .modal-info-side { width:300px; }
        }
    </style>
</head>
<body>
<div id="root"></div>

<script>
    // ONE shared IntersectionObserver for all images — zero per-component overhead
    const imgObserver = new IntersectionObserver(entries => {
        entries.forEach(e => {
            if (!e.isIntersecting) return;
            const img = e.target;
            if (img.dataset.src) { img.src = img.dataset.src; img.removeAttribute('data-src'); }
            imgObserver.unobserve(img);
        });
    }, { rootMargin: '300px' });

    function observeImg(el) { if (el) imgObserver.observe(el); }
</script>

<script type="text/babel">
    const { useState, useEffect, useMemo, useCallback, useRef } = React;

    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSs1GhZQnhVZLayT56Ik4zsE2GaWyVV6A0IeUz6YSMKGSN9jnmXjpWtIVbfUsXH1_Os17RG_oju8Ba3/pub?gid=0&single=true&output=csv";
    const MODEL_PHOTOS_PATH = "./imgs/";

    const IGNORED = new Set(["NAME","TEST","MODEL","EMPTY","ALINA","ANNA","BANANAPOTATO333","ERIN","IZZY","JUNIPER","KATERINA","LUCY","MISTY","NAKEDBARBIEDOLL","NINA","NIKOLETTA QUEEN","RAINI","SCARLETT","SCARLETT HAMPTOM","SHYLA","TESSA","THEODORA","VIOLET RAY","WILD HALLI","YUIWOO"]);

    function toFileName(name) {
        return name.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g,'-') + ".jpg";
    }
    function parseTags(s) {
        if (!s) return [];
        return s.replace(/,/g,' ').split(/[#\s]+/).map(t=>t.trim()).filter(Boolean);
    }
    function parseCSV(csv) {
        const lines = csv.trim().split('\n');
        const out = [];
        for (let i = 1; i < lines.length; i++) {
            const v = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            if (!v[2]) continue;
            const name = v[2].trim();
            if (IGNORED.has(name.toUpperCase())) continue;
            let embed = v[6]?.trim() || "";
            if (embed.includes("dood")) embed = embed.replace("/d/","/e/");
            out.push({
                ModelName: name,
                Link1: v[3]?.trim() || '',
                Link2: v[4]?.trim() || '',
                Link3: v[5]?.trim() || '',
                EmbedVideo: embed,
                Guests: v[7]?.trim() || '',
                Category: v[8]?.trim() || '',
                ID: v[10]?.trim() || '',
                Tags: parseTags(v[11]?.replace(/"/g,'').trim()),
                VideoThumbnail: v[14]?.trim() || '',
                ModelPhoto: v[0]?.trim() || '',
            });
        }
        return out.reverse();
    }
    function useDebounce(val, ms) {
        const [dv, setDv] = useState(val);
        useEffect(() => { const t = setTimeout(()=>setDv(val), ms); return ()=>clearTimeout(t); }, [val, ms]);
        return dv;
    }

    // Icons as static JSX constants — rendered once, reused everywhere
    const ICback = <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>;
    const ICsearch = <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>;
    const ICplay = <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>;
    const ICext = <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>;
    const ICx20 = <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>;
    const ICx18 = <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>;

    // LazyImg — uses shared observer, NO useState, NO useEffect after mount
    const LazyImg = React.memo(({ src, alt, cls, fallback }) => (
        <img
            ref={el => observeImg(el)}
            data-src={src}
            alt={alt}
            decoding="async"
            className={"lazy-img " + (cls || "")}
            onLoad={e => e.target.classList.add('loaded')}
            onError={e => { e.target.onerror=null; e.target.src=fallback; e.target.classList.add('loaded'); }}
        />
    ));

    const ModelCard = React.memo(({ model, onClick }) => (
        <div onClick={onClick} className="cursor-pointer group">
            <div className="card-thumb ratio-card rounded-2xl mb-2 bg-slate-900 ring-1 ring-white/5 group-hover:ring-pink-500/40 transition-shadow duration-200">
                <LazyImg
                    src={model.image}
                    alt={model.name}
                    fallback={`https://ui-avatars.com/api/?name=${encodeURIComponent(model.name)}&background=1e293b&color=fff&size=400`}
                />
                <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-black/5 to-transparent pointer-events-none"/>
                <span className="absolute bottom-2 left-3 text-[8px] font-black text-pink-500 uppercase tracking-widest">{model.count} vídeos</span>
            </div>
            <p className="text-center text-xs font-bold text-slate-400 group-hover:text-white truncate transition-colors">{model.name}</p>
        </div>
    ));

    const VideoCard = React.memo(({ video, onClick }) => (
        <div onClick={onClick} className="cursor-pointer group bg-slate-900/40 hover:bg-slate-900/70 border border-white/5 rounded-2xl overflow-hidden transition-colors">
            <div className="card-thumb ratio-video bg-slate-800">
                <LazyImg
                    src={video.VideoThumbnail || video.ModelPhoto}
                    alt={video.ID}
                    fallback="https://placehold.co/600x338/0f172a/1e293b?text=."
                />
                <div className="play-overlay">
                    <div className="w-11 h-11 bg-pink-600 rounded-full flex items-center justify-center shadow-lg">{ICplay}</div>
                </div>
                {video.Category && (
                    <span className="absolute top-2 right-2 bg-black/70 backdrop-blur-sm px-2 py-0.5 rounded text-[8px] font-bold uppercase">{video.Category}</span>
                )}
            </div>
            <div className="p-3">
                <p className="font-bold text-slate-100 text-xs truncate">ID: {video.ID}</p>
                {video.Guests && <p className="text-[9px] text-pink-500 font-bold uppercase mt-0.5">w/ {video.Guests}</p>}
            </div>
        </div>
    ));

    const LINK_STYLES = [
        'bg-pink-600 hover:bg-pink-700',
        'bg-slate-800 hover:bg-slate-700',
        'bg-slate-800 hover:bg-slate-700',
    ];
    const LINK_LABELS = ['Primary Server', 'Backup Mirror', 'Mirror 2'];

    const VideoModal = React.memo(({ video, onClose }) => {
        const onBg = useCallback(e => { if (e.target === e.currentTarget) onClose(); }, [onClose]);
        useEffect(() => {
            const h = e => { if (e.key === 'Escape') onClose(); };
            window.addEventListener('keydown', h);
            return () => window.removeEventListener('keydown', h);
        }, [onClose]);

        const links = [video.Link1, video.Link2, video.Link3].map((href, i) => ({ href, label: LINK_LABELS[i], style: LINK_STYLES[i] })).filter(l => l.href);

        return (
            <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center modal-bg animate-in" onClick={onBg}>
                <div className="modal-inner shadow-2xl">
                    <div className="modal-video-side">
                        <iframe src={video.EmbedVideo} allowFullScreen/>
                        <button onClick={onClose} className="absolute top-3 right-3 md:hidden bg-black/60 rounded-full p-1.5">{ICx18}</button>
                    </div>
                    <div className="modal-info-side custom-scroll">
                        <div className="flex items-start justify-between gap-2 mb-4">
                            <div className="min-w-0">
                                <h2 className="text-base font-black uppercase italic text-white leading-tight truncate">{video.ModelName}</h2>
                                {video.Category && <p className="text-pink-500 font-bold text-[9px] tracking-widest uppercase mt-0.5">{video.Category}</p>}
                                {video.Guests  && <p className="text-slate-400 text-[10px] mt-1">w/ {video.Guests}</p>}
                                <p className="text-slate-600 text-[9px] mt-1 font-mono">ID: {video.ID}</p>
                            </div>
                            <button onClick={onClose} className="hidden md:flex flex-shrink-0 text-slate-500 hover:text-white transition-colors p-1">{ICx20}</button>
                        </div>
                        <div className="flex flex-col gap-2">
                            {links.length > 0
                                ? links.map(({ href, label, style }) => (
                                    <a key={href} href={href} target="_blank" rel="noopener noreferrer"
                                       className={`flex items-center justify-between px-3 py-2.5 rounded-xl text-[10px] font-black uppercase transition-colors ${style}`}>
                                        {label} {ICext}
                                    </a>
                                ))
                                : <p className="text-slate-600 text-xs">Nenhum link disponível.</p>
                            }
                        </div>
                    </div>
                </div>
            </div>
        );
    });

    const App = () => {
        const [data,    setData]  = useState([]);
        const [model,   setModel] = useState(null);
        const [video,   setVideo] = useState(null);
        const [loading, setLoad]  = useState(true);
        const [search,  setSrch]  = useState("");
        const q = useDebounce(search, 280);

        useEffect(() => {
            fetch(SHEET_CSV_URL)
                .then(r => r.text())
                .then(t => { setData(parseCSV(t)); setLoad(false); })
                .catch(e => { console.error(e); setLoad(false); });
        }, []);

        const modelMap = useMemo(() => {
            const map = new Map();
            data.forEach(({ ModelName }) => {
                if (!map.has(ModelName)) map.set(ModelName, { name: ModelName, image: MODEL_PHOTOS_PATH + toFileName(ModelName), count: 0 });
                map.get(ModelName).count++;
            });
            return Array.from(map.values()).filter(m => m.count > 1).sort((a,b) => a.name.localeCompare(b.name));
        }, [data]);

        const models = useMemo(() => {
            if (!q) return modelMap;
            const lq = q.toLowerCase();
            return modelMap.filter(m => m.name.toLowerCase().includes(lq));
        }, [modelMap, q]);

        const videos = useMemo(() => {
            if (!model) return [];
            let list = data.filter(v => v.ModelName === model.name);
            if (q) {
                const lq = q.toLowerCase();
                list = list.filter(v =>
                    v.ID.toLowerCase().includes(lq) ||
                    v.Guests.toLowerCase().includes(lq) ||
                    v.Category.toLowerCase().includes(lq) ||
                    v.Tags.some(t => t.toLowerCase().includes(lq))
                );
            }
            return list;
        }, [model, data, q]);

        const handleBack  = useCallback(() => { setModel(null); setSrch(""); }, []);
        const handleClose = useCallback(() => setVideo(null), []);

        if (loading) return (
            <div className="flex h-screen items-center justify-center bg-slate-950">
                <div className="flex flex-col items-center gap-3">
                    <div className="w-9 h-9 rounded-full border-2 border-pink-500 border-r-transparent animate-spin"/>
                    <span className="text-slate-500 text-[9px] font-black uppercase tracking-[0.3em]">Loading Gallery...</span>
                </div>
            </div>
        );

        return (
            <div className="min-h-screen pb-12 bg-slate-950 text-slate-200">
                <header className="sticky top-0 z-40 bg-slate-900/80 backdrop-blur-xl border-b border-white/5 px-4 py-3">
                    <div className="max-w-7xl mx-auto flex flex-wrap sm:flex-nowrap items-center gap-3">
                        <div className="flex items-center gap-3 flex-shrink-0">
                            {model && (
                                <button onClick={handleBack} className="p-2 hover:bg-white/10 rounded-full transition-colors active:scale-90">
                                    {ICback}
                                </button>
                            )}
                            <h1 className="text-lg sm:text-xl font-black italic uppercase tracking-tighter text-white whitespace-nowrap">
                                {model ? model.name : 'Exclusive Portal'}
                            </h1>
                        </div>
                        <div className="relative w-full sm:max-w-sm ml-auto">
                            <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 pointer-events-none">{ICsearch}</span>
                            <input
                                type="search"
                                placeholder={model ? `Buscar em ${model.name}…` : "Buscar modelo…"}
                                value={search}
                                onChange={e => setSrch(e.target.value)}
                                className="w-full bg-slate-950/60 border border-white/10 rounded-xl py-2 pl-9 pr-4 text-sm focus:outline-none focus:border-pink-500/50 transition-colors"
                            />
                        </div>
                    </div>
                </header>

                <main className="max-w-7xl mx-auto px-3 sm:px-6 md:px-8 py-5 md:py-8">
                    {!model ? (
                        <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3 sm:gap-4 md:gap-5 animate-in">
                            {models.map(m => <ModelCard key={m.name} model={m} onClick={() => setModel(m)} />)}
                            {models.length === 0 && <p className="col-span-full text-center text-slate-600 py-16 text-sm">Nenhum modelo encontrado.</p>}
                        </div>
                    ) : (
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-5 animate-in">
                            {videos.map((v, i) => <VideoCard key={v.ID + i} video={v} onClick={() => setVideo(v)} />)}
                            {videos.length === 0 && <p className="col-span-full text-center text-slate-600 py-16 text-sm">Nenhum vídeo encontrado.</p>}
                        </div>
                    )}
                </main>

                {video && <VideoModal video={video} onClose={handleClose} />}
            </div>
        );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
