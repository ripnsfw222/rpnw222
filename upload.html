<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi Mirror Uploader</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#111;
    color:#fff;
    padding:20px;
    max-width:700px;
    margin:auto;
}

h1{
    text-align:center;
}

textarea{
    width:100%;
    height:150px;
    padding:10px;
    border:none;
    border-radius:8px;
    resize:vertical;
}

button{
    width:100%;
    margin-top:10px;
    padding:12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#00aaff;
    color:white;
    font-weight:bold;
}

button:hover{
    opacity:.9;
}

#log{
    margin-top:20px;
    background:#1d1d1d;
    padding:10px;
    border-radius:8px;
    max-height:400px;
    overflow:auto;
    white-space:pre-wrap;
}

.success{
    color:#00ff88;
}

.error{
    color:#ff6666;
}
</style>

</head>
<body>

<h1>Multi Mirror Uploader</h1>

<textarea id="urls" placeholder="Cole uma ou mais URLs (uma por linha)"></textarea>

<button onclick="iniciar()">Enviar para Doodstream, Lulustream e Streamtape</button>

<div id="log"></div>

<script>

// =========================
// CONFIGURE SUAS APIS
// =========================

const DOOD_KEY = "SUA_DOOD_KEY";

const LULU_KEY = "SUA_LULU_KEY";

const STREAMTAPE_LOGIN = "SEU_LOGIN";

const STREAMTAPE_KEY = "SUA_STREAMTAPE_KEY";

// =========================

function log(msg, classe=""){
    const div = document.createElement("div");
    div.className = classe;
    div.textContent = msg;
    document.getElementById("log").appendChild(div);
}

function converterPixeldrain(url){

    const match = url.match(
        /pixeldrain\.com\/u\/([a-zA-Z0-9]+)/i
    );

    if(match){
        return `https://pixeldrain.com/api/file/${match[1]}`;
    }

    return url;
}

async function requisicao(nome, url){

    try{

        const r = await fetch(url);

        const texto = await r.text();

        log(`✅ ${nome}: ${texto.substring(0,200)}`, "success");

    }catch(e){

        log(`❌ ${nome}: ${e.message}`, "error");

    }

}

async function enviar(url){

    url = converterPixeldrain(url);

    log("");
    log("================================");
    log("URL: " + url);
    log("================================");

    const dood =
        `https://doodapi.co/api/upload/url?key=${DOOD_KEY}&url=${encodeURIComponent(url)}`;

    const lulu =
        `https://lulustream.com/api/upload/url?key=${LULU_KEY}&url=${encodeURIComponent(url)}`;

    const streamtape =
        `https://api.streamtape.com/remotedl/add?login=${STREAMTAPE_LOGIN}&key=${STREAMTAPE_KEY}&url=${encodeURIComponent(url)}`;

    await Promise.all([
        requisicao("Doodstream", dood),
        requisicao("Lulustream", lulu),
        requisicao("Streamtape", streamtape)
    ]);

}

async function iniciar(){

    document.getElementById("log").innerHTML = "";

    const urls = document
        .getElementById("urls")
        .value
        .split("\n")
        .map(x => x.trim())
        .filter(x => x);

    for(const url of urls){

        await enviar(url);

    }

    log("");
    log("🎉 Processo finalizado!");
}

</script>

</body>
</html>
