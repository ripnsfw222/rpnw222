<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Organize, assista e gerencie seus vídeos favoritos do YouTube com integração direta ao Google Sheets e preenchimento de AKA inteligente." />
  <title>YouTube Library & Manager</title>
  
  <!-- Google Fonts: Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* VARIABLES & RESET */
    :root {
      --bg-color: #0b0b0f;
      --card-bg: #14141e;
      --glass-bg: rgba(20, 20, 30, 0.75);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --accent: #6ab04c;
      --accent-hover: #519636;
      --accent-glow: rgba(106, 176, 76, 0.3);
      --blue: #3b82f6;
      --blue-hover: #2563eb;
      --red: #ef4444;
      --red-hover: #dc2626;
      --font-main: 'Outfit', sans-serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      background-image: radial-gradient(circle at 50% 0%, rgba(106, 176, 76, 0.08) 0%, transparent 50%);
      color: var(--text-main);
      font-family: var(--font-main);
      min-height: 100vh;
      padding-bottom: 3rem;
      overflow-x: hidden;
    }

    /* SCROLLBAR */
    ::-webkit-scrollbar {
      width: 10px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-color);
    }
    ::-webkit-scrollbar-thumb {
      background: #27273a;
      border-radius: 5px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #3b3b54;
    }

    /* MAIN HEADER */
    .main-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 75px;
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 2rem;
      z-index: 999;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
    }

    .header-left h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .header-left h1 span {
      color: var(--accent);
      text-shadow: 0 0 12px var(--accent-glow);
    }

    /* STATS PANEL */
    .stats-container {
      display: flex;
      gap: 1.25rem;
      align-items: center;
    }

    .stat-badge {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--glass-border);
      padding: 0.5rem 1rem;
      border-radius: 50px;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 500;
      color: var(--text-muted);
    }

    .stat-badge strong {
      color: var(--accent);
      font-size: 1rem;
    }

    /* BUTTONS */
    .btn {
      padding: 0.6rem 1.2rem;
      font-size: 0.9rem;
      font-weight: 600;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--font-main);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn-accent {
      background: var(--accent);
      color: var(--bg-color);
      box-shadow: 0 4px 14px var(--accent-glow);
    }

    .btn-accent:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px var(--accent-glow);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      color: var(--text-main);
    }

    .btn-secondary:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
    }

    .btn-secondary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-danger {
      background: var(--red);
      color: white;
    }

    .btn-danger:hover {
      background: var(--red-hover);
      transform: translateY(-2px);
    }

    .header-actions {
      display: flex;
      gap: 0.75rem;
    }

    /* PAGE CONTAINER & CONTROLS */
    .main-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 110px 2rem 2rem;
    }

    .controls-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
      background: var(--card-bg);
      border: 1px solid var(--glass-border);
      padding: 1rem 1.5rem;
      border-radius: 12px;
    }

    .nav-buttons {
      display: flex;
      gap: 0.5rem;
    }

    .search-wrapper {
      position: relative;
      flex-grow: 1;
      max-width: 500px;
      min-width: 260px;
    }

    .search-bar {
      width: 100%;
      padding: 0.7rem 1rem 0.7rem 2.5rem;
      font-size: 0.95rem;
      border-radius: 8px;
      border: 1px solid var(--glass-border);
      background: rgba(0, 0, 0, 0.2);
      color: var(--text-main);
      font-family: var(--font-main);
      transition: all 0.3s;
    }

    .search-bar:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 10px rgba(106, 176, 76, 0.15);
      background: rgba(0, 0, 0, 0.4);
    }

    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 1rem;
      pointer-events: none;
    }

    .order-select {
      padding: 0.7rem 1.5rem 0.7rem 1rem;
      font-size: 0.95rem;
      border-radius: 8px;
      border: 1px solid var(--glass-border);
      background: rgba(0, 0, 0, 0.2);
      color: var(--text-main);
      cursor: pointer;
      font-family: var(--font-main);
      outline: none;
      transition: all 0.3s;
    }

    .order-select:focus {
      border-color: var(--accent);
    }



    /* VIDEO GRID */
    .videos {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 2rem;
    }

    .video-card {
      background: var(--card-bg);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100%;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .video-card:hover {
      transform: translateY(-5px);
      border-color: rgba(106, 176, 76, 0.3);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
    }

    .thumbnail-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: #000;
      cursor: pointer;
    }

    .thumbnail-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s, opacity 0.3s ease;
    }

    .video-card:hover .thumbnail-wrapper img {
      transform: scale(1.05);
    }

    /* CARD BODY */
    .card-body {
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }

    .video-card h4 {
      font-size: 1.05rem;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 0.75rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-overflow: ellipsis;
      height: 2.94rem;
    }

    .video-card h4 a {
      color: inherit;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .video-card h4 a:hover {
      color: var(--accent);
    }

    .video-info {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .channel-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.3rem;
    }

    .channel-link {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .channel-link:hover {
      color: var(--accent-hover);
      text-decoration: underline;
    }

    .channel-aka {
      font-style: italic;
      color: #93c5fd;
      font-size: 0.8rem;
    }

    .published-date {
      color: #747d8c;
      font-weight: 500;
    }

    /* CARD ACTIONS */
    .card-actions {
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      padding: 0.75rem 1.25rem;
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
      background: rgba(0, 0, 0, 0.15);
    }

    .btn-card {
      padding: 0.4rem 0.8rem;
      font-size: 0.8rem;
      border-radius: 6px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-family: var(--font-main);
      transition: all 0.2s;
    }

    .btn-card-edit {
      background: rgba(59, 130, 246, 0.15);
      color: var(--blue);
      border: 1px solid rgba(59, 130, 246, 0.3);
    }

    .btn-card-edit:hover {
      background: var(--blue);
      color: white;
    }

    .btn-card-delete {
      background: rgba(239, 68, 68, 0.15);
      color: var(--red);
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .btn-card-delete:hover {
      background: var(--red);
      color: white;
    }

    /* MODAL WINDOWS */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: var(--card-bg);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      animation: modalFadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes modalFadeIn {
      from {
        opacity: 0;
        transform: scale(0.95) translateY(10px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .modal-header {
      padding: 1.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h2 {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text-main);
    }

    .close-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.25rem;
      cursor: pointer;
      padding: 0.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
    }

    .close-btn:hover {
      color: var(--text-main);
    }

    .modal-body {
      padding: 1.5rem;
    }

    /* FORMS */
    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 0.75rem 1rem;
      font-size: 0.95rem;
      border-radius: 8px;
      border: 1px solid var(--glass-border);
      background: rgba(0, 0, 0, 0.3);
      color: var(--text-main);
      font-family: var(--font-main);
      outline: none;
      transition: border-color 0.3s;
    }

    .form-group input:focus {
      border-color: var(--accent);
    }

    .form-help {
      font-size: 0.8rem;
      color: #747d8c;
      margin-top: 0.3rem;
    }

    /* DYNAMIC TAGS */
    .channel-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    .channel-tag {
      background: rgba(106, 176, 76, 0.12);
      border: 1px solid rgba(106, 176, 76, 0.25);
      color: var(--accent);
      padding: 0.3rem 0.6rem;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }

    .channel-tag button {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font-weight: 800;
      font-size: 0.85rem;
      line-height: 1;
    }

    .channel-tag button:hover {
      color: var(--red);
    }

    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.75rem;
      margin-top: 2rem;
    }

    /* ALERTS */
    .alert-container {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 1100;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      pointer-events: none;
    }

    .alert {
      background: var(--card-bg);
      border-left: 4px solid var(--accent);
      padding: 1rem 1.5rem;
      border-radius: 6px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
      color: var(--text-main);
      font-weight: 500;
      font-size: 0.9rem;
      animation: alertSlideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      pointer-events: auto;
      max-width: 350px;
    }

    .alert-error {
      border-left-color: var(--red);
    }

    @keyframes alertSlideIn {
      from {
        opacity: 0;
        transform: translateX(50px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      grid-column: 1 / -1;
      background: var(--card-bg);
      border: 1px dashed var(--glass-border);
      border-radius: 12px;
      color: var(--text-muted);
    }

    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .empty-state h3 {
      font-size: 1.25rem;
      color: var(--text-main);
      margin-bottom: 0.5rem;
    }



    /* RESPONSIVENESS */
    @media (max-width: 768px) {
      .main-header {
        flex-direction: column;
        height: auto;
        padding: 1rem;
        gap: 0.75rem;
      }
      .main-container {
        padding-top: 180px;
        padding-left: 1rem;
        padding-right: 1rem;
      }
      .stats-container {
        flex-wrap: wrap;
        justify-content: center;
      }
      .controls-bar {
        flex-direction: column;
        align-items: stretch;
      }
      .search-wrapper {
        max-width: 100%;
      }
    }

    /* PLAYER MODAL SPECIFIC & THEATER MODE */
    #playerModal .modal-content {
      max-width: 800px;
      padding: 0;
      background: #000;
      overflow: hidden;
      border-radius: 16px;
      transition: max-width 0.4s cubic-bezier(0.16, 1, 0.3, 1), max-height 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    #playerModal.theater-mode {
      padding: 1rem;
    }
    
    #playerModal.theater-mode .modal-content {
      max-width: 96vw;
      max-height: 96vh;
    }
    
    .theater-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.2s ease;
      padding: 0.4rem 0.8rem;
      border-radius: 8px;
    }
    
    .theater-btn:hover {
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.08);
    }
    
    .theater-btn .theater-text {
      font-size: 0.85rem;
      font-weight: 600;
      font-family: var(--font-main);
    }
  </style>
</head>

<body>
  <!-- HEADER COM LOGO E ESTATÍSTICAS -->
  <header class="main-header">
    <div class="header-left">
      <h1>🎥 <span>YT Library</span></h1>
    </div>
    
    <div class="stats-container">
      <div class="stat-badge">
        📂 Vídeos: <strong id="statTotalVideos">0</strong>
      </div>
      <div class="stat-badge">
        📺 Modelos (Canais): <strong id="statTotalChannels">0</strong>
      </div>
    </div>

    <div class="header-actions">
      <button id="btnAddNewVideo" class="btn btn-accent" onclick="openAddModal()">
        ➕ Adicionar Vídeo
      </button>
    </div>
  </header>

  <!-- CONTEÚDO PRINCIPAL -->
  <main class="main-container">
    <div class="controls-bar">
      <div class="nav-buttons">
        <button id="btnInicio" class="btn btn-secondary" type="button">Início</button>
        <button id="btnVoltar" class="btn btn-secondary" type="button" disabled>Voltar</button>
      </div>
      
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input class="search-bar" type="text" placeholder="Buscar por título, canal, AKA ou ID..." />
      </div>

      <select class="order-select">
        <option value="newest">Mais novos primeiro</option>
        <option value="oldest">Mais antigos primeiro</option>
      </select>
    </div>


    
    <!-- Grade de Vídeos -->
    <div class="videos" id="videoContainer"></div>
  </main>

  <!-- MODAL ADICIONAR / EDITAR VÍDEO -->
  <div class="modal" id="videoModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Adicionar Vídeo</h2>
        <button class="close-btn" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <form id="videoForm" onsubmit="saveVideo(event)">
          <div class="form-group">
            <label for="videoUrl">URL ou ID do Vídeo *</label>
            <div style="display: flex; gap: 0.5rem; width: 100%;">
              <input type="text" id="videoUrl" required placeholder="https://www.youtube.com/watch?v=... ou apenas o ID" style="flex-grow: 1; margin-bottom: 0;" />
              <button type="button" id="btnAutoFill" class="btn btn-secondary" onclick="triggerAutoFill()" style="white-space: nowrap; padding: 0 1rem; border-radius: 8px;">✨ Auto-preencher</button>
            </div>
            <div class="form-help">Cole o link completo do YouTube ou o ID de 11 caracteres.</div>
          </div>

          <div class="form-group">
            <label for="videoTitle">Título *</label>
            <input type="text" id="videoTitle" required placeholder="Título do vídeo" />
          </div>

          <div class="form-group">
            <label for="channelInput">Canais / Modelos *</label>
            <input type="text" id="channelInput" placeholder="Digite o nome do canal/modelo e pressione Enter" />
            <div class="form-help">Pressione Enter após digitar o nome de cada canal para adicioná-lo.</div>
            <div class="channel-tags" id="channelTags"></div>
          </div>

          <div class="form-group">
            <label for="videoAka">AKA (Nomes Adicionais / Apelidos)</label>
            <input type="text" id="videoAka" placeholder="Ex: apelido1, apelido2" />
            <div class="form-help">Nomes adicionais que a modelo possui. O sistema auto-completa se já conhecidos!</div>
          </div>

          <div class="form-group">
            <label for="publishDate">Data de Publicação</label>
            <input type="text" id="publishDate" placeholder="Ex: DD/MM/AAAA ou AAAA-MM-DD" />
          </div>

          <input type="hidden" id="editIndex" value="" />

          <div class="form-actions">
            <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
            <button type="submit" class="btn btn-accent">Salvar Vídeo</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- MODAL PLAYER DE VÍDEO -->
  <div class="modal" id="playerModal">
    <div class="modal-content">
      <div class="modal-header" style="padding: 0.75rem 1.5rem; background: var(--card-bg); border-bottom: 1px solid var(--glass-border); border-radius: 16px 16px 0 0; display: flex; align-items: center; justify-content: space-between;">
        <button id="btnTheater" class="theater-btn" onclick="toggleTheaterMode()" title="Alternar Modo Teatro">
          <span class="theater-icon">🎭</span> <span class="theater-text">Modo Teatro</span>
        </button>
        <button class="close-btn" onclick="closePlayerModal()">✕</button>
      </div>
      <div class="player-container" style="position: relative; width: 100%; aspect-ratio: 16 / 9;">
        <iframe id="youtubePlayer" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></iframe>
      </div>
    </div>
  </div>



  <!-- CONTAINER DE ALERTAS -->
  <div class="alert-container" id="alertContainer"></div>

  <!-- JAVASCRIPT LOGIC -->
  <script>
    // Configurações
    const API_URL = "https://script.google.com/macros/s/AKfycbxqvwjx8angMVltfAU_ijBujnRwVcQe8qIPaOnoVNLGp2ldozB3Fyo-nRxbVDkSylg/exec";

    // Estados da aplicação
    let allVideos = [];
    let channelToAka = {}; // Dicionário global: nome do canal (lowercase) -> aka string
    let lastFilteredVideos = null;
    let currentChannels = [];
    let isSaving = false;

    // Elementos DOM
    const inputSearch = document.querySelector('.search-bar');
    const selectOrder = document.querySelector('.order-select');
    const btnInicio = document.getElementById('btnInicio');
    const btnVoltar = document.getElementById('btnVoltar');

    const videoContainer = document.getElementById('videoContainer');
    const statTotalVideos = document.getElementById('statTotalVideos');
    const statTotalChannels = document.getElementById('statTotalChannels');
    const videoModal = document.getElementById('videoModal');

    const channelInput = document.getElementById('channelInput');
    const channelTagsContainer = document.getElementById('channelTags');

    // Analisa data de forma segura suportando múltiplos formatos (ex: DD/MM/AAAA e AAAA-MM-DD)
    function parseDateSafely(dateStr) {
      if (!dateStr) return new Date(0);
      
      dateStr = dateStr.toString().trim();
      
      // Se for AAAA-MM-DD
      if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) {
        return new Date(dateStr + "T00:00:00");
      }
      
      // Se for DD/MM/AAAA
      const brMatch = dateStr.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
      if (brMatch) {
        return new Date(Number(brMatch[3]), Number(brMatch[2]) - 1, Number(brMatch[1]));
      }
      
      const parsed = new Date(dateStr);
      return isNaN(parsed.getTime()) ? new Date(0) : parsed;
    }

    // Carrega dados da API do Apps Script (com fallbacks)
    async function loadVideos() {
      showLoading(true);
      try {
        console.log('Obtendo vídeos da planilha via Apps Script...');
        const res = await fetch(API_URL);
        if (!res.ok) throw new Error('Falha ao obter dados do Google Sheets');
        const data = await res.json();
        allVideos = Array.isArray(data) ? data : [];
        console.log(`✅ ${allVideos.length} vídeos carregados com sucesso.`);
        
        // Processamento de AKAs inteligente
        resolveAndAutoCompleteAkas();
        
      } catch (err) {
        console.warn('⚠️ Erro de conexão com Apps Script. Usando fallback...', err);
        showAlert('Sem conexão com a Planilha. Usando dados locais.', 'error');
        
        // Fallback 1: localStorage
        const saved = localStorage.getItem('youtubeVideos');
        if (saved) {
          allVideos = JSON.parse(saved);
        } else {
          // Fallback 2: Arquivo estático videos.json local
          try {
            const localRes = await fetch('videos.json');
            if (localRes.ok) {
              allVideos = await localRes.json();
            }
          } catch(e) {
            console.error('Falha em todos os fallbacks:', e);
          }
        }
        
        resolveAndAutoCompleteAkas();
      } finally {
        showLoading(false);
        handleFilter(false);
      }
    }

    // Salva os vídeos na Planilha (via POST sem preflight CORS)
    async function saveToStorage(payload = null) {
      if (isSaving) return;
      isSaving = true;
      
      // Salva no localStorage como backup imediato
      localStorage.setItem('youtubeVideos', JSON.stringify(allVideos));
      
      // Se não passar payload, envia a lista inteira (retrocompatibilidade)
      const requestBody = payload ? payload : allVideos;
      
      try {
        console.log('Enviando dados para o Google Sheets...');
        // NOTA: Para evitar erro de CORS pré-flight, não passamos headers de JSON.
        // O Apps Script recebe como text/plain e analisa e.postData.contents
        const res = await fetch(API_URL, {
          method: 'POST',
          mode: 'cors',
          body: JSON.stringify(requestBody)
        });
        
        if (res.ok) {
          const result = await res.json();
          if (result.success) {
            console.log('💾 Dados persistidos no Google Sheets com sucesso!');
            showAlert('Salvo com sucesso na Planilha!', 'success');
          } else {
            throw new Error(result.error || 'Erro reportado pelo Apps Script');
          }
        } else {
          throw new Error('Código de status HTTP de erro: ' + res.status);
        }
      } catch (err) {
        console.error('❌ Erro ao salvar dados:', err);
        showAlert('Erro ao gravar na Planilha. Gravado localmente.', 'error');
      } finally {
        isSaving = false;
        updateStats(allVideos);
      }
    }

    // Analisa, monta o dicionário de AKA e auto-completa os registros que estão em branco
    function resolveAndAutoCompleteAkas() {
      channelToAka = {};
      
      // Passo 1: Construir o dicionário mapeando cada canal para seu AKA
      allVideos.forEach(v => {
        const channelsList = Array.isArray(v.channels) ? v.channels : [v.channels];
        const akaValue = v.aka ? v.aka.toString().trim() : '';
        
        if (akaValue) {
          channelsList.forEach(ch => {
            if (ch) {
              const key = ch.trim().toLowerCase();
              const existing = channelToAka[key];
              
              if (!existing) {
                channelToAka[key] = akaValue;
              } else {
                // Se o canal já tem um AKA registrado, mesclamos os valores únicos
                const existingParts = existing.split(',').map(s => s.trim().toLowerCase());
                const newParts = akaValue.split(',').map(s => s.trim().toLowerCase());
                const mergedUnique = Array.from(new Set([...existingParts, ...newParts]));
                
                // Mantém as grafias originais encontradas nos textos
                const allOriginals = [...akaValue.split(','), ...existing.split(',')].map(s => s.trim());
                const resultAka = mergedUnique.map(p => {
                  return allOriginals.find(orig => orig.toLowerCase() === p) || p;
                }).join(', ');
                
                channelToAka[key] = resultAka;
              }
            }
          });
        }
      });
      
      // Passo 2: Sincronizar e preencher o AKA completo em todos os vídeos do canal correspondente
      let countAutoFilled = 0;
      allVideos.forEach(v => {
        const channelsList = Array.isArray(v.channels) ? v.channels : [v.channels];
        for (const ch of channelsList) {
          if (ch) {
            const key = ch.trim().toLowerCase();
            const unifiedAka = channelToAka[key];
            if (unifiedAka && v.aka !== unifiedAka) {
              v.aka = unifiedAka;
              countAutoFilled++;
              break;
            }
          }
        }
      });

      if (countAutoFilled > 0) {
        console.log(`🧠 Inteligência AKA: Preenchido automaticamente o AKA de ${countAutoFilled} vídeos.`);
      }
      
      updateStats(allVideos);
    }

    // Calcula e atualiza estatísticas no topo da página
    function updateStats(videosList) {
      statTotalVideos.textContent = videosList.length;
      
      const uniqueChannels = new Set();
      videosList.forEach(v => {
        const chList = Array.isArray(v.channels) ? v.channels : [v.channels];
        chList.forEach(ch => {
          if (ch) uniqueChannels.add(ch.trim());
        });
      });
      
      statTotalChannels.textContent = uniqueChannels.size;
    }

    // Filtra e exibe os vídeos
    function displayVideos(videosList) {
      videoContainer.innerHTML = '';

      // Ordenação inteligente com parse robusto
      const order = selectOrder.value;
      videosList.sort((a, b) => {
        const dateA = parseDateSafely(a.publishedAt);
        const dateB = parseDateSafely(b.publishedAt);
        return order === 'newest' ? dateB - dateA : dateA - dateB;
      });

      if (videosList.length === 0) {
        videoContainer.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📹</div>
            <h3>Nenhum vídeo encontrado</h3>
            <p>Seu catálogo está vazio ou a busca não retornou resultados.</p>
          </div>
        `;
        return;
      }

      videosList.forEach(video => {
        const videoId = video.id;
        const title = video.title;
        const thumbnail = `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`;
        const channelsList = Array.isArray(video.channels) ? video.channels : [video.channels];
        
        let publishedAt = 'Data não definida';
        if (video.publishedAt) {
          const parsedDate = parseDateSafely(video.publishedAt);
          if (parsedDate.getTime() > 0) {
            publishedAt = parsedDate.toLocaleDateString('pt-BR');
          } else {
            publishedAt = video.publishedAt; // Fallback: exibe exatamente o texto que o usuário salvou
          }
        }
        
        const aka = video.aka ? video.aka.toString().trim() : '';

        const card = document.createElement('div');
        card.className = 'video-card';
        card.innerHTML = `
          <div class="thumbnail-wrapper" 
               data-video-id="${videoId}"
               onmouseenter="startThumbnailPreview(this)" 
               onmouseleave="stopThumbnailPreview(this)"
               onclick="openPlayerModal('${videoId}', '${title.replace(/'/g, "\\'")}')">
            <img src="${thumbnail}" alt="${title}">
          </div>
          <div class="card-body">
            <h4><a href="https://www.youtube.com/watch?v=${videoId}" target="_blank" rel="noopener noreferrer" style="color: inherit; text-decoration: none; transition: color 0.2s;">${title}</a></h4>
            <div class="video-info">
              <div class="channel-row">
                👤 ${channelsList.map(ch => `<a href="#" class="channel-link">${ch}</a>`).join(' | ')}
              </div>
              ${aka ? `<div class="channel-aka">🏷️ AKA: ${aka}</div>` : ''}
              <div class="published-date">📅 ${publishedAt}</div>
              <div style="font-size:0.75rem; color:#555; margin-top:2px;">🔗 ID: ${videoId}</div>
            </div>
          </div>
          <div class="card-actions">
            <button class="btn-card btn-card-edit" onclick="editVideo('${videoId}')">✏️ Editar</button>
            <button class="btn-card btn-card-delete" onclick="deleteVideo('${videoId}')">🗑️ Excluir</button>
          </div>
        `;
        videoContainer.appendChild(card);
      });

      // Vincula cliques nas marcas/canais para auto-filtragem
      const channelLinks = videoContainer.querySelectorAll('.channel-link');
      channelLinks.forEach(link => {
        link.addEventListener('click', e => {
          e.preventDefault();
          const channelName = e.target.textContent;
          inputSearch.value = channelName;
          handleFilter(true);
        });
      });


      btnVoltar.disabled = (lastFilteredVideos === null);
    }

    // Controla o filtro de busca textual inteligente (inclui canais, título e AKA)
    function handleFilter(saveHistory = false) {
      const query = inputSearch.value.trim().toLowerCase();
      
      const filtered = allVideos.filter(v => {
        const titleMatch = (v.title || '').toLowerCase().includes(query);
        
        const channelsList = Array.isArray(v.channels) ? v.channels : [v.channels];
        const channelMatch = channelsList.some(ch => (ch || '').toLowerCase().includes(query));
        
        const akaMatch = (v.aka || '').toLowerCase().includes(query);
        const idMatch = (v.id || '').toLowerCase().includes(query);
        
        return titleMatch || channelMatch || akaMatch || idMatch;
      });

      if (saveHistory) {
        lastFilteredVideos = allVideos.slice();
      }

      displayVideos(filtered);
    }



    // Extrai o ID do vídeo a partir de URL do YouTube
    function extractVideoId(input) {
      input = input.trim();
      
      // Se for apenas o ID de 11 caracteres
      if (/^[a-zA-Z0-9_-]{11}$/.test(input)) {
        return input;
      }
      
      // Regex para encontrar o ID em URLs
      const patterns = [
        /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/,
        /youtube\.com\/v\/([a-zA-Z0-9_-]{11})/
      ];
      
      for (const pattern of patterns) {
        const match = input.match(pattern);
        if (match) return match[1];
      }
      
      return null;
    }

    // ALERTA FLUTUANTE NA TELA
    function showAlert(message, type = 'success') {
      const container = document.getElementById('alertContainer');
      const alert = document.createElement('div');
      alert.className = `alert ${type === 'error' ? 'alert-error' : ''}`;
      alert.innerHTML = `<span>${type === 'error' ? '❌' : '✅'}</span> ${message}`;
      
      container.appendChild(alert);
      
      setTimeout(() => {
        alert.style.opacity = '0';
        alert.style.transform = 'translateX(50px)';
        alert.style.transition = 'all 0.3s';
        setTimeout(() => alert.remove(), 3000);
      }, 3000);
    }

    // EXIBE ANIMAÇÃO DE CARREGANDO
    function showLoading(show) {
      const container = document.getElementById('videoContainer');
      if (show) {
        container.innerHTML = `
          <div style="grid-column: 1 / -1; text-align: center; padding: 5rem 0;">
            <div style="display:inline-block; width:50px; height:50px; border:4px solid rgba(106, 176, 76, 0.1); border-top-color:var(--accent); border-radius:50%; animation:spin 1s infinite linear;"></div>
            <p style="margin-top:1.5rem; font-weight:600; color:var(--text-muted);">Sincronizando com o Google Sheets...</p>
          </div>
        `;
      }
    }

    // Injeção de CSS de rotação temporária
    const styleSheet = document.createElement("style");
    styleSheet.innerText = "@keyframes spin { to { transform: rotate(360deg); } }";
    document.head.appendChild(styleSheet);

    /* --- LÓGICA DO FORMULÁRIO / MODAL --- */

    function openAddModal() {
      editingIndex = -1;
      document.getElementById('modalTitle').textContent = 'Adicionar Vídeo';
      document.getElementById('videoForm').reset();
      document.getElementById('editIndex').value = '';
      currentChannels = [];
      renderChannelTags();
      videoModal.classList.add('active');
    }

    function editVideo(videoId) {
      const index = allVideos.findIndex(v => v.id === videoId);
      if (index === -1) return;

      editingIndex = index;
      const video = allVideos[index];
      
      document.getElementById('modalTitle').textContent = 'Editar Vídeo';
      document.getElementById('videoUrl').value = video.id;
      document.getElementById('videoTitle').value = video.title;
      document.getElementById('videoAka').value = video.aka || '';
      
      if (video.publishedAt) {
        document.getElementById('publishDate').value = video.publishedAt;
      } else {
        document.getElementById('publishDate').value = '';
      }
      
      currentChannels = Array.isArray(video.channels) ? [...video.channels] : [video.channels];
      renderChannelTags();
      
      videoModal.classList.add('active');
    }

    function closeModal() {
      videoModal.classList.remove('active');
    }

    // Adiciona canais à lista temporária
    channelInput.addEventListener('keypress', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const val = channelInput.value.trim();
        if (val && !currentChannels.includes(val)) {
          currentChannels.push(val);
          renderChannelTags();
          channelInput.value = '';
          
          // Auto-preenche o AKA caso encontre no dicionário para os canais atuais
          const akaInput = document.getElementById('videoAka');
          if (!akaInput.value.trim()) {
            const suggestion = suggestAkaForChannels(currentChannels);
            if (suggestion) {
              akaInput.value = suggestion;
              showAlert('Sugestão de AKA adicionada!', 'success');
            }
          }
        }
      }
    });

    function suggestAkaForChannels(channelsList) {
      for (const ch of channelsList) {
        if (ch) {
          const key = ch.trim().toLowerCase();
          if (channelToAka[key]) {
            return channelToAka[key];
          }
        }
      }
      return '';
    }

    function removeChannelTag(idx) {
      currentChannels.splice(idx, 1);
      renderChannelTags();
    }

    function renderChannelTags() {
      channelTagsContainer.innerHTML = currentChannels.map((ch, i) => `
        <span class="channel-tag">
          ${ch}
          <button type="button" onclick="removeChannelTag(${i})">✕</button>
        </span>
      `).join('');
    }

    // Auto-preenche Título, Data e Canais do YouTube
    async function triggerAutoFill() {
      const urlInput = document.getElementById('videoUrl').value.trim();
      const videoId = extractVideoId(urlInput);
      
      if (!videoId) {
        showAlert('Cole uma URL válida do YouTube primeiro!', 'error');
        return;
      }
      
      const btn = document.getElementById('btnAutoFill');
      const originalText = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '⌛ Buscando...';
      
      try {
        const res = await fetch(`${API_URL}?action=fetchMetadata&id=${videoId}`);
        if (!res.ok) throw new Error('Erro na requisição');
        
        const result = await res.json();
        if (result.success && result.data) {
          const meta = result.data;
          
          if (meta.title) {
            document.getElementById('videoTitle').value = meta.title;
          }
          
          if (meta.publishDate) {
            document.getElementById('publishDate').value = meta.publishDate;
          }
          
          if (meta.channel) {
            if (!currentChannels.includes(meta.channel)) {
              currentChannels.push(meta.channel);
              renderChannelTags();
              
              // Sugestão AKA inteligente
              const akaInput = document.getElementById('videoAka');
              if (!akaInput.value.trim()) {
                const suggestion = suggestAkaForChannels(currentChannels);
                if (suggestion) {
                  akaInput.value = suggestion;
                }
              }
            }
          }
          
          showAlert('Dados obtidos com sucesso do YouTube!', 'success');
        } else {
          throw new Error(result.error || 'Informações não encontradas no YouTube.');
        }
      } catch (err) {
        console.error(err);
        showAlert('Falha ao obter dados. Preencha manualmente.', 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = originalText;
      }
    }

    // Salva o cadastro (Inclusão / Edição)
    async function saveVideo(event) {
      event.preventDefault();
      
      const urlInput = document.getElementById('videoUrl').value;
      const videoId = extractVideoId(urlInput);
      
      if (!videoId) {
        showAlert('ID ou URL do vídeo inválida!', 'error');
        return;
      }

      // Validação de duplicatas (evita cadastrar o mesmo vídeo mais de uma vez)
      const duplicateIndex = allVideos.findIndex(v => v.id === videoId);
      if (duplicateIndex >= 0 && duplicateIndex !== editingIndex) {
        showAlert('Este vídeo já está cadastrado no catálogo!', 'error');
        return;
      }

      if (currentChannels.length === 0) {
        showAlert('Adicione pelo menos um canal/modelo!', 'error');
        return;
      }

      let akaValue = document.getElementById('videoAka').value.trim();
      
      // Se deixou o AKA vazio, verifica se há algum preenchimento automático inteligente
      if (!akaValue) {
        akaValue = suggestAkaForChannels(currentChannels);
      }

      const video = {
        id: videoId,
        title: document.getElementById('videoTitle').value.trim(),
        channels: currentChannels,
        publishedAt: document.getElementById('publishDate').value || null,
        embed: `https://www.youtube.com/embed/${videoId}`,
        aka: akaValue
      };

      let actionPayload = null;
      if (editingIndex >= 0) {
        const oldVideoId = allVideos[editingIndex].id;
        allVideos[editingIndex] = video;
        actionPayload = { action: 'edit', id: oldVideoId, video: video };
        showAlert('Vídeo atualizado com sucesso!', 'success');
      } else {
        allVideos.unshift(video);
        actionPayload = { action: 'add', video: video };
        showAlert('Vídeo adicionado com sucesso!', 'success');
      }

      closeModal();
      
      // Re-processa AKAs para aplicar a inteligência de propagação e atualiza a view
      resolveAndAutoCompleteAkas();
      handleFilter(false);
      
      // Envia para o Sheets
      await saveToStorage(actionPayload);
    }

    // Exclui um vídeo do catálogo
    async function deleteVideo(videoId) {
      if (confirm('Tem certeza de que deseja remover este vídeo do catálogo?')) {
        const index = allVideos.findIndex(v => v.id === videoId);
        if (index === -1) return;
        
        allVideos.splice(index, 1);
        
        resolveAndAutoCompleteAkas();
        handleFilter(false);
        
        await saveToStorage({ action: 'delete', id: videoId });
        showAlert('Vídeo excluído com sucesso!', 'success');
      }
    }

    // Controla o Modal do Player de Vídeo
    const playerModal = document.getElementById('playerModal');
    const youtubePlayer = document.getElementById('youtubePlayer');

    function openPlayerModal(videoId, videoTitle) {
      if (activePreviewIframe) {
        stopThumbnailPreview(activePreviewIframe.parentElement);
      }
      youtubePlayer.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
      playerModal.classList.add('active');
    }

    function closePlayerModal() {
      playerModal.classList.remove('active');
      playerModal.classList.remove('theater-mode');
      youtubePlayer.src = '';
      
      // Reset button text
      const btnTheater = document.getElementById('btnTheater');
      if (btnTheater) {
        const theaterIcon = btnTheater.querySelector('.theater-icon');
        const theaterText = btnTheater.querySelector('.theater-text');
        if (theaterIcon) theaterIcon.textContent = '🎭';
        if (theaterText) theaterText.textContent = 'Modo Teatro';
      }
    }

    function toggleTheaterMode() {
      const btnTheater = document.getElementById('btnTheater');
      const theaterIcon = btnTheater.querySelector('.theater-icon');
      const theaterText = btnTheater.querySelector('.theater-text');
      
      const isTheater = playerModal.classList.toggle('theater-mode');
      if (isTheater) {
        theaterIcon.textContent = '📺';
        theaterText.textContent = 'Modo Padrão';
      } else {
        theaterIcon.textContent = '🎭';
        theaterText.textContent = 'Modo Teatro';
      }
    }

    // Controle de Prévia de Vídeo ao passar o mouse (Hover Preview)
    let hoverTimeout = null;
    let activePreviewIframe = null;

    function startThumbnailPreview(wrapper) {
      if (hoverTimeout) clearTimeout(hoverTimeout);
      const videoId = wrapper.getAttribute('data-video-id');
      if (!videoId) return;

      // Delay de 600ms para evitar disparos acidentais ao rolar a página
      hoverTimeout = setTimeout(() => {
        if (activePreviewIframe) {
          stopThumbnailPreview(activePreviewIframe.parentElement);
        }

        const iframe = document.createElement('iframe');
        iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&controls=0&modestbranding=1&rel=0&iv_load_policy=3&showinfo=0&disablekb=1&loop=1&playlist=${videoId}`;
        iframe.style.position = 'absolute';
        iframe.style.top = '0';
        iframe.style.left = '0';
        iframe.style.width = '100%';
        iframe.style.height = '100%';
        iframe.style.border = 'none';
        iframe.style.pointerEvents = 'none'; // Cliques passam direto para o wrapper
        iframe.style.zIndex = '1';
        iframe.setAttribute('allow', 'autoplay; encrypted-media');
        
        const img = wrapper.querySelector('img');
        if (img) img.style.opacity = '0';
        
        wrapper.appendChild(iframe);
        activePreviewIframe = iframe;
      }, 600);
    }

    function stopThumbnailPreview(wrapper) {
      if (hoverTimeout) {
        clearTimeout(hoverTimeout);
        hoverTimeout = null;
      }
      if (!wrapper) return;
      
      const iframe = wrapper.querySelector('iframe');
      if (iframe) {
        iframe.remove();
      }
      
      const img = wrapper.querySelector('img');
      if (img) img.style.opacity = '1';
      
      if (activePreviewIframe === iframe) {
        activePreviewIframe = null;
      }
    }

    /* --- INICIALIZAÇÃO --- */

    // Filtros em tempo real
    inputSearch.addEventListener('input', () => handleFilter(true));
    selectOrder.addEventListener('change', () => handleFilter(false));

    // Botões superiores de navegação histórica
    btnInicio.addEventListener('click', () => {
      inputSearch.value = '';
      lastFilteredVideos = null;
      displayVideos(allVideos);
      btnVoltar.disabled = true;
    });

    btnVoltar.addEventListener('click', () => {
      if (lastFilteredVideos) {
        inputSearch.value = '';
        displayVideos(lastFilteredVideos);
        lastFilteredVideos = null;
        btnVoltar.disabled = true;
      }
    });

    // Disparar carga inicial
    loadVideos();
  </script>
</body>
